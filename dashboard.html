<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WAR ROOM OS — Capital Intelligence Map</title>
<style>
:root{
  --bg:#050811;--bg2:#070c17;--panel:#0a101e;--panel2:#0d1526;--line:#1b2a43;
  --text:#e8f0ff;--muted:#8290a8;--faint:#526079;--cyan:#45d7ff;--green:#36f28b;
  --mag:#ff4fa3;--amber:#ffd166;--purple:#a97aff;--red:#ff5a68;--white:#f7fbff;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  --sans:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;height:100%;background:radial-gradient(circle at 54% -20%,#101b35 0,#060a13 40%,#03060c 100%);color:var(--text);font-family:var(--sans);font-size:13px;overflow:hidden}
button,input,select{font:inherit}.mono{font-family:var(--mono)}
#app{height:100%;display:grid;grid-template-rows:48px minmax(0,1fr) 39px}
.topbar{display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid rgba(69,215,255,.15);background:rgba(5,8,17,.92);backdrop-filter:blur(14px);z-index:10}
.brand{display:flex;align-items:center;gap:9px;min-width:234px}.brandmark{width:27px;height:27px;display:grid;place-items:center;border:1px solid rgba(69,215,255,.5);box-shadow:0 0 24px rgba(69,215,255,.16);font-family:var(--mono);font-weight:900;color:var(--cyan)}
.brandname{font:700 12px var(--mono);letter-spacing:.12em}.brandname b{color:var(--cyan)}.brandver{font:9px var(--mono);color:var(--faint);margin-top:2px}
.top-metrics{display:flex;align-items:center;gap:6px;min-width:0;flex:1;overflow-x:auto;scrollbar-width:none}.top-metrics::-webkit-scrollbar{display:none}
.top-chip{display:flex;gap:6px;align-items:center;white-space:nowrap;border:1px solid var(--line);background:rgba(10,16,30,.7);padding:5px 8px;border-radius:3px;font:10px var(--mono);color:var(--muted)}
.top-chip b{font-weight:700;color:var(--text)}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--faint);box-shadow:0 0 10px currentColor}.status-dot.live{background:var(--green);color:var(--green)}.status-dot.partial{background:var(--amber);color:var(--amber)}.status-dot.bad{background:var(--red);color:var(--red)}
.search{width:220px;background:#07101d;border:1px solid var(--line);color:var(--text);border-radius:3px;padding:7px 9px;font:10px var(--mono);outline:none}.search:focus{border-color:rgba(69,215,255,.65);box-shadow:0 0 0 2px rgba(69,215,255,.08)}
.shell{display:grid;grid-template-columns:214px minmax(0,1fr);min-height:0}
.sidebar{border-right:1px solid rgba(69,215,255,.14);background:linear-gradient(180deg,rgba(8,13,25,.96),rgba(5,8,16,.96));padding:12px 8px;overflow-y:auto;scrollbar-width:thin}
.nav-group{font:9px var(--mono);letter-spacing:.14em;color:#45536c;padding:8px 10px 5px;text-transform:uppercase}.nav-item{position:relative;display:flex;align-items:center;gap:9px;width:100%;border:0;border-left:2px solid transparent;background:transparent;color:var(--muted);padding:8px 10px;text-align:left;cursor:pointer;font:10.5px var(--mono);letter-spacing:.02em;border-radius:0 3px 3px 0}.nav-item:hover{color:var(--text);background:rgba(69,215,255,.04)}.nav-item.active{color:var(--white);border-left-color:var(--cyan);background:linear-gradient(90deg,rgba(69,215,255,.12),rgba(69,215,255,.01));text-shadow:0 0 12px rgba(69,215,255,.45)}.nav-item .ico{width:14px;color:var(--faint);text-align:center}.nav-item.active .ico{color:var(--cyan)}.nav-badge{margin-left:auto;border:1px solid var(--line);padding:1px 4px;border-radius:8px;font-size:8px;color:var(--faint)}
.sidebar-foot{margin:16px 8px 4px;padding:9px;border:1px solid var(--line);background:rgba(9,15,28,.75)}.sidebar-foot .label{font:8px var(--mono);letter-spacing:.12em;color:var(--faint)}.sidebar-foot .value{font:10px var(--mono);margin-top:5px;color:var(--muted);line-height:1.45}
.content{min-width:0;min-height:0;display:grid;grid-template-rows:45px minmax(0,1fr);overflow:hidden}
.viewbar{display:flex;align-items:center;gap:10px;padding:0 13px;border-bottom:1px solid var(--line);background:rgba(7,12,23,.72)}.view-title{font:700 12px var(--mono);letter-spacing:.08em}.view-sub{font:10px var(--mono);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.view-actions{margin-left:auto;display:flex;gap:5px}.seg{border:1px solid var(--line);background:#08101e;color:var(--muted);padding:5px 8px;font:9px var(--mono);cursor:pointer}.seg.active{color:var(--cyan);border-color:rgba(69,215,255,.45);background:rgba(69,215,255,.08)}
.page{min-height:0;padding:10px;display:grid;grid-template-rows:minmax(390px,1fr) 188px;gap:10px;overflow:auto}
.workspace{min-height:390px;display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px}.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,18,34,.88),rgba(6,11,21,.94));box-shadow:inset 0 1px rgba(255,255,255,.02),0 12px 45px rgba(0,0,0,.16);border-radius:4px;min-width:0}.canvas-card{position:relative;overflow:hidden;min-height:390px}.canvas-card:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(62,102,153,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(62,102,153,.05) 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);pointer-events:none}.card-head{height:38px;display:flex;align-items:center;gap:8px;padding:0 11px;border-bottom:1px solid rgba(27,42,67,.8);position:relative;z-index:2}.card-head h3{margin:0;font:10px var(--mono);letter-spacing:.11em;color:var(--muted);text-transform:uppercase}.card-head .meta{font:9px var(--mono);color:var(--faint)}.card-head .right{margin-left:auto;display:flex;align-items:center;gap:6px}.evidence-pill{font:8px var(--mono);letter-spacing:.06em;padding:2px 6px;border:1px solid var(--line);color:var(--faint);border-radius:8px}.evidence-pill.observed{color:var(--cyan);border-color:rgba(69,215,255,.35)}.evidence-pill.structural{color:var(--purple);border-color:rgba(169,122,255,.35)}.evidence-pill.inferred{color:var(--amber);border-color:rgba(255,209,102,.35)}
#graph{height:calc(100% - 38px);min-height:350px;position:relative;z-index:1}#graph svg{display:block;width:100%;height:100%}.edge{fill:none;stroke:#2a4265;opacity:.55}.edge.active{opacity:.9;stroke-dasharray:8 13;animation:none}.edge.constructive{stroke:var(--green)}.edge.destructive{stroke:var(--mag)}.edge.watch{stroke:var(--amber)}.edge.observed{filter:drop-shadow(0 0 4px currentColor)}.edge.inferred{stroke-dasharray:4 8;animation:none}.edge.structural{stroke:var(--purple);opacity:.35}.edge-label{fill:#65748d;font:9px var(--mono)}@keyframes flow{to{stroke-dashoffset:-42}}
.node{cursor:pointer;transition:none}.node:hover{filter:brightness(1.25)}.node-box{fill:#0b1425;stroke:#28405e;stroke-width:1}.node.selected .node-box{stroke:var(--white);stroke-width:1.5;filter:drop-shadow(0 0 8px rgba(255,255,255,.25))}.node.constructive .node-box{stroke:rgba(54,242,139,.7);filter:drop-shadow(0 0 8px rgba(54,242,139,.12))}.node.destructive .node-box{stroke:rgba(255,79,163,.75);filter:drop-shadow(0 0 8px rgba(255,79,163,.13))}.node.watch .node-box{stroke:rgba(255,209,102,.65)}.node.no_data{opacity:.48}.node.structural .node-box{stroke:rgba(169,122,255,.6);stroke-dasharray:5 4}.node-title{fill:var(--text);font:700 10.5px var(--mono)}.node-sub{fill:#718099;font:8.5px var(--mono)}.node-value{fill:var(--cyan);font:700 10px var(--mono)}.node.constructive .node-value{fill:var(--green)}.node.destructive .node-value{fill:var(--mag)}.node.watch .node-value{fill:var(--amber)}.node-badge{fill:#111e32;stroke:#2a405e}.node-badge-text{fill:#8090aa;font:7.5px var(--mono)}
.rail{display:flex;flex-direction:column;min-height:390px}.rail-body{padding:11px;overflow:auto}.location{border:1px solid rgba(69,215,255,.22);background:linear-gradient(135deg,rgba(69,215,255,.08),rgba(169,122,255,.04));padding:10px;margin-bottom:10px}.location .eyebrow{font:8px var(--mono);letter-spacing:.13em;color:var(--cyan)}.location .main{font:700 13px var(--mono);margin-top:5px;line-height:1.35}.location .desc{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px}.decision-row{padding:8px 2px;border-bottom:1px solid rgba(27,42,67,.7)}.decision-row:last-child{border-bottom:0}.decision-label{font:8px var(--mono);letter-spacing:.1em;color:var(--faint);text-transform:uppercase}.decision-value{font:10.5px var(--mono);line-height:1.45;margin-top:3px;color:var(--text)}.decision-value.green{color:var(--green)}.decision-value.mag{color:var(--mag)}.decision-value.amber{color:var(--amber)}.confidence{margin-top:5px;height:5px;background:#111c2e;overflow:hidden}.confidence i{height:100%;display:block;background:linear-gradient(90deg,var(--mag),var(--amber),var(--green))}
.lower{display:grid;grid-template-columns:1.15fr .85fr;gap:10px;min-height:188px}.panel-body{padding:8px 10px;height:148px;overflow:auto}.ledger{display:grid;gap:5px}.ledger-row{display:grid;grid-template-columns:90px minmax(110px,.7fr) minmax(180px,1.5fr) 76px;gap:8px;align-items:center;border-bottom:1px solid rgba(27,42,67,.65);padding:5px 2px;font:9.5px var(--mono)}.ledger-row:last-child{border-bottom:0}.ledger-time{color:var(--faint)}.ledger-ticker{color:var(--white);font-weight:700}.ledger-desc{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.state-tag{justify-self:end;padding:2px 5px;border:1px solid var(--line);color:var(--faint);font-size:8px}.state-tag.live,.state-tag.constructive{color:var(--green);border-color:rgba(54,242,139,.3)}.state-tag.watch,.state-tag.partial{color:var(--amber);border-color:rgba(255,209,102,.3)}.state-tag.destructive,.state-tag.error{color:var(--mag);border-color:rgba(255,79,163,.3)}
.queue{display:grid;gap:5px}.queue-item{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;padding:6px;border:1px solid rgba(27,42,67,.75);background:rgba(10,17,31,.58)}.queue-rank{font:700 12px var(--mono);color:var(--cyan);text-align:center}.queue-main b{font:700 10px var(--mono)}.queue-main div{font:9px var(--mono);color:var(--faint);margin-top:2px}.queue-score{font:700 11px var(--mono);color:var(--green)}
.tape{display:flex;align-items:center;border-top:1px solid rgba(69,215,255,.17);background:#050911;overflow:hidden}.tape-label{height:100%;display:flex;align-items:center;padding:0 11px;background:rgba(69,215,255,.09);color:var(--cyan);font:700 9px var(--mono);letter-spacing:.12em;white-space:nowrap}.tape-track{display:flex;gap:24px;align-items:center;white-space:nowrap;padding-left:20px;animation:none;transform:none;font:9.5px var(--mono);color:var(--muted)}.tape-item b{color:var(--white)}.tape-item .type{color:var(--cyan)}.tape-item .money{color:var(--green)}@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.empty{display:grid;place-items:center;height:100%;min-height:260px;text-align:center;padding:20px}.empty .code{font:700 17px var(--mono);color:var(--faint)}.empty p{max-width:560px;color:var(--muted);font-size:11px;line-height:1.55}.empty b{color:var(--amber)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(1,3,8,.7);backdrop-filter:blur(3px);z-index:30;display:none}.drawer-backdrop.open{display:block}.drawer{position:absolute;right:0;top:0;height:100%;width:min(510px,92vw);background:#070c16;border-left:1px solid var(--line);overflow:auto}.drawer-head{position:sticky;top:0;display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid var(--line);background:rgba(7,12,22,.96);z-index:2}.drawer-head b{font:700 14px var(--mono)}.drawer-close{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);padding:4px 8px;cursor:pointer}.drawer-body{padding:12px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.detail-cell{border:1px solid var(--line);padding:8px;background:#0a111f}.detail-cell .k{font:8px var(--mono);color:var(--faint);text-transform:uppercase;letter-spacing:.08em}.detail-cell .v{font:10px var(--mono);margin-top:5px;word-break:break-word}.raw{margin-top:10px;white-space:pre-wrap;font:9px/1.5 var(--mono);color:#77869f;border:1px solid var(--line);background:#050a13;padding:9px;max-height:420px;overflow:auto}
@media(max-width:1050px){.shell{grid-template-columns:174px minmax(0,1fr)}.workspace{grid-template-columns:minmax(0,1fr) 270px}.search{display:none}.lower{grid-template-columns:1fr}.page{grid-template-rows:minmax(400px,1fr) auto}.panel-body{height:160px}}
@media(max-width:760px){html,body{overflow:auto}#app{height:auto;min-height:100%;grid-template-rows:48px auto 39px}.shell{display:block}.sidebar{display:flex;overflow-x:auto;border-right:0;border-bottom:1px solid var(--line);padding:4px}.nav-group,.sidebar-foot{display:none}.nav-item{width:auto;white-space:nowrap;border-left:0;border-bottom:2px solid transparent}.nav-item.active{border-bottom-color:var(--cyan)}.content{overflow:visible}.page{display:block;overflow:visible}.workspace{display:block}.rail{margin-top:10px}.lower{margin-top:10px}.canvas-card{height:480px}.top-metrics{display:none}}
</style>
</head>
<body>
<script>/*__INJECT_DATA__*/</script>
<div id="app">
  <header class="topbar">
    <div class="brand"><div class="brandmark">W</div><div><div class="brandname">WAR ROOM <b>OS</b></div><div class="brandver">CAPITAL INTELLIGENCE MAP · v2.8 STAGED LIVE</div></div></div>
    <div class="top-metrics" id="topMetrics"></div>
    <span id="dataSync" class="top-chip">SYNC <b>BOOTING</b></span><input class="search" id="search" placeholder="SEARCH TICKER / THEME / EVENT" />
  </header>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <section class="content">
      <div class="viewbar"><div class="view-title" id="viewTitle"></div><div class="view-sub" id="viewSub"></div><div class="view-actions"><button class="seg active" data-mode="observed">OBSERVED</button><button class="seg" data-mode="all">ALL LAYERS</button></div></div>
      <main class="page">
        <div class="workspace">
          <section class="card canvas-card"><div class="card-head"><h3 id="canvasTitle">CAPITAL MAP</h3><span class="meta" id="canvasMeta"></span><div class="right" id="canvasBadges"></div></div><div id="graph"></div></section>
          <aside class="card rail"><div class="card-head"><h3>DECISION RAIL</h3><div class="right"><span class="evidence-pill observed">LIVE STATE</span></div></div><div class="rail-body" id="rail"></div></aside>
        </div>
        <div class="lower">
          <section class="card"><div class="card-head"><h3 id="ledgerTitle">EVIDENCE LEDGER</h3><span class="meta" id="ledgerMeta"></span></div><div class="panel-body" id="ledger"></div></section>
          <section class="card"><div class="card-head"><h3 id="queueTitle">DECISION QUEUE</h3><span class="meta" id="queueMeta"></span></div><div class="panel-body" id="queue"></div></section>
        </div>
      </main>
    </section>
  </div>
  <footer class="tape"><div class="tape-label">LIVE EVENT TAPE</div><div class="tape-track" id="tape"></div></footer>
</div>
<div class="drawer-backdrop" id="drawerBackdrop"><div class="drawer"><div class="drawer-head"><b id="drawerTitle">DETAIL</b><button class="drawer-close" id="drawerClose">CLOSE</button></div><div class="drawer-body" id="drawerBody"></div></div></div>
<script>
(() => {
'use strict';
let D = window.DASHBOARD_DATA || {};
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const arr = x => Array.isArray(x) ? x : [];
const obj = x => x && typeof x === 'object' ? x : {};
const num = x => { const n=Number(x); return Number.isFinite(n)?n:null; };
const fmt = x => x===null||x===undefined||x===''?'—':String(x);
const money = x => { const n=num(x); if(n===null)return '—'; const a=Math.abs(n); return (n<0?'-':'')+'$'+(a>=1e9?(a/1e9).toFixed(1)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0)); };
const pct = x => { const n=num(x); return n===null?'—':(n>0?'+':'')+n.toFixed(1)+'%'; };
const timeLabel = x => { if(!x)return '—'; try { const d=new Date(x); return isNaN(d)?String(x).slice(0,19):d.toISOString().replace('T',' ').slice(0,19)+'Z'; } catch(e){return String(x).slice(0,19);} };
const short = (s,n=58) => String(s??'').length>n?String(s).slice(0,n-1)+'…':String(s??'');
function setHTML(id,html){const el=document.getElementById(id);if(el&&el.innerHTML!==html)el.innerHTML=html;}
const normalizeState = s => { const v=String(s??'').toUpperCase(); if(/LIVE|BULL|LONG|EXPAND|ACCUM|IMPROV|POSITIVE|CONSTRUCT/.test(v))return 'constructive'; if(/BEAR|SHORT|CONTRACT|DISTRIB|DETERIOR|NEGATIVE|RISK|CRITICAL|ERROR|BROKEN/.test(v))return 'destructive'; if(/WATCH|MIXED|PARTIAL|WAIT|TRANSITION|GUARDED|STANDBY|NO_SIGNAL|ACTION_REQUIRED|INITIALIZING/.test(v))return 'watch'; if(/NO_DATA|NOT_CONFIGURED|NOT_ENTITLED|EMPTY|UNAVAILABLE|OFFLINE|NONE|—/.test(v))return 'no_data'; return 'neutral'; };
let sourceState = obj(D.data_health).overall || obj(D.meta).source || 'NO_DATA';
let LI = obj(D.live_intelligence);
let FLD = obj(D.full_live_data);
let lastRevision = Number(obj(D.runtime).snapshot_sequence || 0);
let lastContentHash = String(obj(D.runtime).content_hash || '');
let lastPollOkAt = Date.now();
function staticAssetUrl(filename){
  // Local HTML is embedded as srcdoc by st.iframe. Resolve static assets against the parent
  // Streamlit route, including an optional server.baseUrlPath used by hosted deployments.
  try{
    const parentUrl=new URL(window.parent.location.href);
    let base=parentUrl.pathname||'/';
    if(!base.endsWith('/'))base=base.slice(0,base.lastIndexOf('/')+1);
    return new URL(`${base}app/static/${filename}`,parentUrl.origin).toString();
  }catch(_){return `/app/static/${filename}`;}
}
const DATA_URL = staticAssetUrl('desk_snapshot.json');
const STATUS_URL = staticAssetUrl('worker_status.json');
const POLL_MS = Math.max(5000, Number(new URLSearchParams(location.search).get('poll_ms') || 7000));
let pollInFlight=false;

const NAV = [
 {group:'COMMAND',items:[['mc','⌖','MISSION CONTROL'],['macro','◈','MACRO & REGIME'],['ew','⚠','EARLY WARNING']]},
 {group:'OPPORTUNITY',items:[['alpha','◆','ALPHA CENTER'],['inst','◎','INSTITUTIONAL'],['deriv','≋','DERIVATIVES / SQUEEZE']]},
 {group:'MARKETS',items:[['us','▦','US STOCKS'],['ihsg','▥','IHSG'],['crypto','⬡','CRYPTO'],['commod','◇','COMMODITIES'],['fx','⇄','FX']]},
 {group:'INTELLIGENCE',items:[['flow','⟿','FLOW & ROTATION'],['sc','⌁','SUPPLY CHAIN'],['co','▣','COMPANY INTEL'],['kg','✣','KNOWLEDGE GRAPH']]},
 {group:'CONTROL',items:[['rc','✓','VALIDATION CENTER']]}
];
const savedState=(()=>{try{return JSON.parse(localStorage.getItem('warroom_ui_state')||'{}')}catch(_){return {}}})();
let state={view:savedState.view||'mc',mode:savedState.mode||'observed',selected:null,selectedTicker:savedState.selectedTicker||null,search:''};
function persistState(){try{localStorage.setItem('warroom_ui_state',JSON.stringify({view:state.view,mode:state.mode,selectedTicker:state.selectedTicker}))}catch(_){}}

function renderSidebar(){
 const counts={alpha:state.mode==='all'?arr(D.alpha).length:0,inst:arr(obj(D.institutional).events).length,deriv:arr(LI.events).length};
 setHTML('sidebar',NAV.map(g=>`<div class="nav-group">${g.group}</div>${g.items.map(([id,ico,label])=>`<button class="nav-item ${state.view===id?'active':''}" data-view="${id}"><span class="ico">${ico}</span>${label}${counts[id]?`<span class="nav-badge">${counts[id]}</span>`:''}</button>`).join('')}`).join('')+`<div class="sidebar-foot"><div class="label">PRODUCTION RULE</div><div class="value">Missing feed = NO DATA.<br>Synthetic data is disabled unless explicit test mode.</div></div>`);
 document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.selected=null;persistState();render();});
}

function renderTop(){
 const sys=obj(D.systemic), health=obj(D.data_health), inst=obj(D.institutional), li=LI;
 const dot=health.overall==='LIVE'?'live':health.overall==='PARTIAL'?'partial':'bad';
 const feeds=arr(health.sources); const good=feeds.filter(x=>x.state==='LIVE').length;
 const chips=[
  `<span class="status-dot ${dot}"></span><b>${esc(health.overall||obj(D.meta).source||'NO_DATA')}</b>`,
  `REGIME <b>${esc(sys.quad_name||sys.quad||'NO_DATA')}</b>`,
  `LIQUIDITY <b>${esc(short(sys.liquidity||'NO_DATA',24))}</b>`,
  `SOURCES <b>${good}/${feeds.length||0}</b>`,
  `INSTITUTIONAL <b>${esc(inst.overall_state||'NOT_LOADED')}</b>`,
  `DERIVATIVES <b>${esc(li.overall_state||'NOT_LOADED')}</b>`,
  `FULL STACK <b>${esc(FLD.overall_state||'NOT_LOADED')}</b>`,
  `UPDATED <b>${esc(timeLabel(obj(D.meta).generated))}</b>`
 ];
 setHTML('topMetrics',chips.map(x=>`<div class="top-chip">${x}</div>`).join(''));
 const sync=document.getElementById('dataSync');if(sync&&!sync.dataset.worker){const age=Math.max(0,Math.round((Date.now()-lastPollOkAt)/1000));sync.innerHTML=`SYNC <b>${age<15?'LIVE':age<60?'DELAYED':'STALE'} · R${lastRevision}</b>`;}
}

function node(id,label,sub,value,stateName='neutral',evidence='observed',extra={}){return {id,label,sub,value,state:normalizeState(stateName),evidence,...extra};}
function edge(from,to,stateName='neutral',evidence='observed',label='',width=1.7,extra={}){
 return {from,to,state:normalizeState(stateName),evidence,label,width,active:false,relation:'association',...extra};
}
function layered(layers){
 const nodes=[]; const edges=[]; const xPad=72, width=856, top=55, bottom=555;
 layers.forEach((layer,li)=>{
  const y=layers.length===1?300:top+(bottom-top)*li/(layers.length-1); const n=layer.length;
  layer.forEach((nd,ni)=>{const x=n===1?500:xPad+(width)*(ni/(n-1)); nd.x=x;nd.y=y;nodes.push(nd);});
 });
 return {nodes,edges};
}
function connectAll(graph,fromLayer,toLayer,stateName='neutral',evidence='observed'){

function marketSetups(id){return arr(obj(obj(D.markets)[id]).setups).filter(x=>x&&x.tk&&x.tk!=='—');}

function setupDirection(s){
 const a=String(s?.act||s?.ty||'').toUpperCase();
 if(/SHORT|SELL|DISTRIB|BREAKDOWN|REDUCE/.test(a))return 'short';
 if(/LONG|BUY|BUILD|ACCUM|BREAKOUT/.test(a))return 'long';
 return 'neutral';
}
function biasDirection(b){
 const x=String(b||'').toUpperCase();
 if(/SHORT|BEAR|RISK_OFF|DEFENS/.test(x))return 'short';
 if(/LONG|BULL|RISK_ON|CONSTRUCT/.test(x))return 'long';
 return 'neutral';
}
function isSetupAligned(marketId,marketBias,s){
 const sd=setupDirection(s), bd=biasDirection(marketBias);
 if(marketId==='idx' && sd==='short')return false;
 if(sd==='neutral')return true;
 // A neutral, missing or partial market context is not permission for both long and short.
 // This was the reason Alpha showed BUILD_LONG cards while the parent market was NEUTRAL.
 if(bd==='neutral')return false;
 return sd===bd;
}
function marketObservedState(m,b){
 const loaded=num(obj(m?.funnel).universe)||num(b?.coverage)||0;
 const raw=String(m?.data_state||b?.state||'').toUpperCase();

function marketContextValue(id,m,b){

 if(observed!=='LIVE')return 'NO_DATA';
 const bias=String(m?.bias||'').toUpperCase();
 if(id==='fx' && (String(m?.bias_state||'').toUpperCase()!=='LIVE'||!bias||bias==='NO_DATA'))return 'SPOT LIVE · MACRO PENDING';
 if(!bias||bias==='NO_DATA')return 'PRICE LIVE · CONTEXT PENDING';
 return bias;
}
function marketContextState(id,m,b){

 return (!bias||bias==='NO_DATA')?'PARTIAL':bias;

 return !(blocked.has(normalizeState(a.state))||blocked.has(normalizeState(b.state)));

function firstCandidates(limit=8){
 const out=[];
 Object.entries(obj(D.markets)).forEach(([marketId,m])=>{
  const bias=m?.bias||'NO_DATA';
  arr(m?.setups).forEach(s=>{
   if(!s?.tk||s.tk==='—')return;
   const fxMacroReady=marketId!=='fx'||String(m?.bias_state||'').toUpperCase()==='LIVE';
   const aligned=fxMacroReady&&isSetupAligned(marketId,bias,s);
   out.push({ticker:s.tk,score:num(s.conv)||0,why:s.why,stage:s.act||s.ty,evidence:'observed',market:marketId,aligned,bias,raw:s});
  });
  // Keep loaded names available for Company Intel even when no trade setup passes. These rows are
  // explicitly PRICE CONTEXT and never become actionable/aligned candidates.
  arr(breadthFor(marketId).constituents).slice(0,8).forEach(r=>{
   const ticker=r.ticker||r.tk;if(ticker&&!out.some(x=>x.ticker===ticker))out.push({ticker,score:0,why:`Loaded price context · 1D ${pct(r.ret_1d)} · 5D ${pct(r.ret_5d)}`,stage:'PRICE CONTEXT',evidence:'observed',market:marketId,aligned:false,bias,raw:r});
  });
 });
 if(state.mode==='all')arr(D.alpha).forEach(a=>a.tk&&out.push({ticker:a.tk,score:num(a.asymmetry)||0,why:a.node||a.scarcity||a.stage,stage:a.stage||'ALPHA',evidence:'structural',market:a.market||a.domain||null,aligned:false,raw:a}));
 const seen=new Set();
 return out.filter(x=>!seen.has(x.ticker)&&seen.add(x.ticker))
  .sort((a,b)=>(Number(b.aligned)-Number(a.aligned))||(b.score-a.score)).slice(0,limit);
}

function modelMission(){
 const sys=obj(D.systemic), markets=obj(D.markets);
 const l0=[node('liq','GLOBAL LIQUIDITY','macro/liquidity observations',short(sys.liquidity||'NO_DATA',18),sys.liquidity,'observed',{raw:sys})];
 const l1=[node('regime','REGIME',`growth ${fmt(sys.growth_roc)} · inflation ${fmt(sys.infl_roc)}`,sys.quad_name||sys.quad||'NO_DATA',sys.quad_name||sys.quad,'inferred',{raw:sys})];
 const ids=[['us','US'],['idx','IHSG'],['crypto','CRYPTO'],['commodity','COMMOD'],['fx','FX']];
 const l2=ids.map(([id,label])=>{const m=obj(markets[id]),b=breadthFor(id);return node('m_'+id,label,`${obj(m.funnel).universe||b.coverage||0} loaded · ${obj(m.funnel).setups||0} surfaced`,marketContextValue(id,m,b),marketContextState(id,m,b),'inferred',{raw:m,market:id});});
 const all=firstCandidates(80).filter(c=>c.evidence==='observed'&&c.aligned);
 const perMarket=[];
 ids.forEach(([id])=>{const c=all.filter(x=>x.market===id).sort((a,b)=>b.score-a.score)[0];if(c)perMarket.push(c);});
 const l3=perMarket.length?perMarket.map((c,i)=>node('c_'+i,c.ticker,short(c.why,34),c.stage||'CANDIDATE',c.stage,c.evidence||'observed',{raw:c,market:c.market})):[node('none','NO ALIGNED ACTIONABLE TICKER','data loaded; current gates emitted no actionable ticker','NO_SIGNAL','NO_SIGNAL')];
 const g=layered([l0,l1,l2,l3]);
 // Keep each overview candidate directly below its actual parent market to eliminate crossing lines.
 l3.forEach(c=>{if(c.id==='none')return;const parent=l2.find(m=>m.market===c.market);if(parent)c.x=parent.x;});
 // derived relationship: liquidity is an input to the regime model, not an observed cash-flow ledger.
 if(edgeAllowed(l0[0],l1[0]))g.edges.push(edge('liq','regime','watch','inferred','model input',1.8,{active:false,relation:'model_input'}));
 l2.forEach(m=>{if(edgeAllowed(l1[0],m))g.edges.push(edge('regime',m.id,m.state,'inferred','regime filter',1.7,{active:false,relation:'regime_filter'}));});
 l3.forEach(c=>{
  if(c.id==='none')return;
  const parent=l2.find(m=>m.market===c.market);
  if(parent&&edgeAllowed(parent,c))g.edges.push(edge(parent.id,c.id,c.state,'inferred','aligned setup',2.0,{active:true,relation:'candidate_lineage'}));
 });
 const rotationsIn=arr(sys.rotation_in), rotationsOut=arr(sys.rotation_out);
 return {title:'MISSION CONTROL',sub:'World → regime → market → aligned candidate. Every candidate arrow now follows its actual market lineage; no index/modulo routing.',canvas:'GLOBAL CAPITAL STATE',badges:['observed','inferred'],graph:g,
  rail:basicRail(`Quad ${fmt(sys.quad||'—')} · ${fmt(sys.quad_name||'NO_DATA')}`,
   `Liquidity: ${fmt(sys.liquidity)}. Cross-asset: ${fmt(sys.cross_asset)}.`,
   rotationsIn.length?`Rotation-in candidates: ${rotationsIn.join(', ')}`:'No validated rotation-in list.',
   perMarket.map(x=>x.ticker).join(' → ')||'Wait for aligned data and conviction gates.',
   rotationsOut.length?`Rotation-out: ${rotationsOut.join(', ')}`:'Alternative path not confirmed.',
   `Shock ${fmt(sys.shock_prob)} · Fragility ${fmt(sys.fragility)}`,'Driven by active regime horizon',55,'OPEN THE STRONGEST EVIDENCE PATH'),
  ledger:arr(obj(D.data_health).sources).slice(0,14).map(x=>({time:obj(D.meta).generated,ticker:x.provider,desc:`${x.dataset}: ${x.note}`,state:x.state})), queue:firstCandidates(20).filter(x=>x.aligned).slice(0,8)};
}

function modelAlpha(){
 const structural=arr(D.alpha);
 const observed=firstCandidates(80).filter(x=>x.evidence==='observed');
 const aligned=observed.filter(x=>x.aligned);
 const instTickers=new Set([...arr(obj(D.institutional).events),...arr(LI.events)].map(x=>String(x.ticker||'').toUpperCase()).filter(Boolean));
 const fundTickers=new Set(arr(FLD.sec_fundamentals).map(x=>String(x.ticker||'').toUpperCase()).filter(Boolean));
 const enriched=aligned.map(a=>{
  const key=String(a.ticker||'').toUpperCase();
  const inst=instTickers.has(key), fund=fundTickers.has(key);
  const evidenceCount=Number(inst)+Number(fund);
  return {...a,inst,fund,evidenceCount,
   researchStage:evidenceCount===2?'MULTI-SOURCE WATCH':evidenceCount===1?'PARTIAL EVIDENCE':'PRICE / MARKET WATCH',
   blocker:evidenceCount===2?'Predictive selector and prospective gate still not approved':inst?'Fundamental/value-capture evidence missing':fund?'Institutional confirmation missing':'Institutional + fundamental confirmation missing'};
 }).sort((a,b)=>(b.evidenceCount-a.evidenceCount)||(b.score-a.score));

 if(state.mode!=='all'){
  const discovery=node('alpha_pool','TACTICAL DISCOVERY POOL',`${observed.length} observed price contexts`,'RESEARCH ONLY','watch','observed',{raw:{observed:observed.length}});
  const alignGate=node('alpha_align','MARKET ALIGNMENT',`${aligned.length}/${observed.length} direction-aligned`,aligned.length?'PARTIAL':'NO_SIGNAL',aligned.length?'watch':'NO_SIGNAL','inferred',{raw:{aligned:aligned.length,total:observed.length}});
  const evidenceGate=node('alpha_evidence','INDEPENDENT EVIDENCE',`${enriched.filter(x=>x.evidenceCount>0).length} with institutional or filed facts`,enriched.some(x=>x.evidenceCount>0)?'PARTIAL':'ACTION_REQUIRED',enriched.some(x=>x.evidenceCount>0)?'watch':'ACTION_REQUIRED','observed');
  const permission=node('alpha_permission','CAPITAL PERMISSION','validated selector + prospective record','BLOCKED','NO_SIGNAL','inferred',{raw:{paper:false,live:false}});
  const candidates=(enriched.length?enriched:observed).slice(0,5).map((a,i)=>node('alpha_c_'+i,a.ticker,
    `${String(a.market||'').toUpperCase()} · ${a.researchStage||'FAILED ALIGNMENT'}`,
    `${researchActionLabel(a.stage)} · R${Math.round(a.score||0)}`,
    a.evidenceCount===2?'watch':a.aligned?'watch':'NO_SIGNAL','observed',{raw:a,market:a.market}));
  const last=candidates.length?candidates:[node('alpha_none','NO CURRENT CANDIDATE','data loaded; none passed market alignment','NO_SIGNAL','NO_SIGNAL')];
  const g=layered([[discovery],[alignGate,evidenceGate,permission],last]);
  g.edges.push(edge(discovery.id,alignGate.id,'watch','inferred','direction gate',1.7,{relation:'market_alignment'}));
  g.edges.push(edge(alignGate.id,evidenceGate.id,'watch','inferred','independent evidence',1.7,{relation:'evidence_gate'}));
  g.edges.push(edge(evidenceGate.id,permission.id,'watch','inferred','validation gate',1.7,{relation:'capital_permission'}));
  candidates.forEach(n=>{
    const raw=n.raw||{};
    if(raw.aligned)g.edges.push(edge(alignGate.id,n.id,'watch','inferred','market aligned',1.5,{relation:'candidate_alignment'}));
    if(raw.evidenceCount>0)g.edges.push(edge(evidenceGate.id,n.id,'watch','observed',raw.evidenceCount===2?'institutional + filed facts':'one independent source',1.7,{active:true,relation:'candidate_evidence'}));
  });
  const lead=enriched[0];
  const title=lead?`${lead.ticker} · ${lead.researchStage}`:'NO ACTIONABLE ALPHA';
  return {title:'ALPHA CENTER',sub:'Readable stage-gate view. These are tactical research candidates, not a validated alpha selector or capital permission.',canvas:'ALPHA EVIDENCE FUNNEL',badges:['observed','inferred'],graph:g,
   rail:basicRail(title,
    lead?`${lead.ticker} is market-aligned, but remains research-only. Readiness R${Math.round(lead.score||0)} is descriptive, not probability.`:'Observed data is loaded, but no candidate has cleared market alignment.',
    `Discovery ${observed.length} · aligned ${aligned.length} · independent evidence ${enriched.filter(x=>x.evidenceCount>0).length} · capital permission 0.`,
    lead?`Next blocker: ${lead.blocker}.`:'Wait for a direction-aligned setup, then verify mechanism/value capture and independent evidence.',
    'A price setup can disappear when market state, revisions, institutional evidence or execution conditions change.',
    'Any missing required source, stale data, setup invalidation or market-bias reversal keeps the candidate blocked.',
    'Setup horizon first; structural thesis and prospective validation are separate horizons',lead?Math.min(70,35+lead.evidenceCount*15):0,'OPEN EVIDENCE TRACE — NO CAPITAL ACTION'),
   ledger:(enriched.length?enriched:observed).slice(0,25).map(a=>({time:obj(D.meta).generated,ticker:a.ticker,desc:`${a.aligned?'MARKET ALIGNED':'FAILED ALIGNMENT'} · ${a.researchStage||'PRICE CONTEXT'} · ${a.blocker||('bias '+a.bias)} · readiness R${Math.round(a.score||0)} is not probability`,state:a.aligned?'PARTIAL':'NO_SIGNAL',raw:a})),
   queue:enriched.slice(0,8).map(a=>({ticker:a.ticker,score:Math.min(70,35+a.evidenceCount*15),why:a.blocker,stage:a.researchStage}))};

 const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),timeoutMs);
 try{const response=await fetch(`${url}?r=${Date.now()}`,{cache:'no-store',signal:controller.signal});if(!response.ok)throw new Error(`${url} ${response.status}`);return await response.json();}
 finally{clearTimeout(timer);}
}
async function pollSnapshot(){
 if(pollInFlight)return;pollInFlight=true;
 try{
  const next=await fetchJsonBounded(DATA_URL);lastPollOkAt=Date.now();acceptSnapshot(next);
  try{const status=await fetchJsonBounded(STATUS_URL,2500);const sync=document.getElementById('dataSync');if(sync){const st=String(status.state||'UNKNOWN');sync.dataset.worker='1';const err=String(status.error||'');const html=`SYNC <b>${esc(st)} · R${lastRevision}${err?' · '+esc(short(err,55)):''}</b>`;if(sync.innerHTML!==html)sync.innerHTML=html;sync.classList.toggle('bad',/ERROR|FATAL/.test(st));}}catch(_){ }
 }catch(err){const sync=document.getElementById('dataSync');if(sync){const html=`SYNC <b>RETRYING · R${lastRevision}</b>`;if(sync.innerHTML!==html)sync.innerHTML=html;}}
 finally{pollInFlight=false;}
}

document.querySelectorAll('.seg').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;persistState();render();});
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;const model=getModel();setHTML('ledger',renderLedger(model.ledger));setHTML('queue',renderQueue(model.queue));});
document.getElementById('drawerClose').onclick=()=>document.getElementById('drawerBackdrop').classList.remove('open');document.getElementById('drawerBackdrop').onclick=e=>{if(e.target.id==='drawerBackdrop')e.currentTarget.classList.remove('open');};
render();
pollSnapshot();
setInterval(pollSnapshot,POLL_MS);
})();
</script>
