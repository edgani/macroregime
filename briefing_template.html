<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121823; --panel2:#0f1520; --line:#1f2935;
    --txt:#e6edf3; --sub:#8b97a7; --dim:#5b6675;
    --grn:#3fb950; --red:#f85149; --amb:#d6a429; --inf:#4493f8;
    --risk:#d6a429;            /* set at runtime from the compass */
    --risk-soft:rgba(214,164,41,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--txt); overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  /* ── stage ── */
  #stage{position:relative;height:100vh;width:100%;overflow:hidden}
  .slide{
    position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
    padding:clamp(28px,6vw,90px); opacity:0; transform:translateX(40px);
    transition:opacity .42s ease,transform .42s ease; pointer-events:none;
    max-width:1100px;margin:0 auto;
  }
  .slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
  .slide.prev{transform:translateX(-40px)}
  .eyebrow{
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--risk);
    font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:"";width:26px;height:2px;background:var(--risk);display:inline-block}
  h1{font-size:clamp(34px,6.5vw,76px);font-weight:760;line-height:1.02;letter-spacing:-.02em;margin-bottom:18px}
  h2{font-size:clamp(22px,3.6vw,40px);font-weight:720;line-height:1.08;letter-spacing:-.01em;margin-bottom:26px}
  .lede{font-size:clamp(15px,1.9vw,21px);color:var(--sub);line-height:1.5;max-width:760px}
  .big{color:var(--risk)}
  .k{color:var(--dim);font-size:13px;letter-spacing:.04em;text-transform:uppercase}
  /* ── changed list ── */
  ul.changed{list-style:none;display:flex;flex-direction:column;gap:13px;margin-top:8px}
  ul.changed li{
    display:flex;gap:14px;align-items:flex-start;font-size:clamp(15px,1.9vw,19px);line-height:1.4;
    padding:14px 18px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  }
  ul.changed li::before{content:"→";color:var(--risk);font-weight:700;flex:none}
  /* ── regime grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:6px}
  .cell{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .cell .k{display:block;margin-bottom:8px}
  .cell .v{font-size:clamp(18px,2.4vw,26px);font-weight:680}
  .pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:650;letter-spacing:.02em}
  .pill.grn{background:rgba(63,185,80,.16);color:var(--grn)} .pill.red{background:rgba(248,81,73,.16);color:var(--red)}
  .pill.amb{background:rgba(214,164,41,.16);color:var(--amb)} .pill.inf{background:rgba(68,147,248,.16);color:var(--inf)}
  /* ── compass ── */
  .compass-wrap{display:grid;grid-template-columns:minmax(220px,300px) 1fr;gap:clamp(20px,4vw,56px);align-items:center;margin-top:4px}
  @media(max-width:720px){.compass-wrap{grid-template-columns:1fr}}
  .gauge{position:relative;width:100%;max-width:300px}
  .axes{display:flex;flex-direction:column;gap:9px}
  .axis{display:grid;grid-template-columns:124px 1fr;gap:12px;align-items:center;font-size:13px}
  .axis .nm{color:var(--sub);text-align:right;font-size:12.5px;line-height:1.15}
  .bar{position:relative;height:24px;background:var(--panel);border-radius:6px;border:1px solid var(--line);overflow:hidden}
  .bar .mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--dim);opacity:.5}
  .bar .fill{position:absolute;top:3px;bottom:3px;border-radius:4px;transition:width .6s ease}
  .bar .fill.dn{right:50%;background:linear-gradient(90deg,var(--grn),rgba(63,185,80,.5))}
  .bar .fill.up{left:50%;background:linear-gradient(270deg,var(--red),rgba(248,81,73,.5))}
  .axis .vd{font-size:11.5px;color:var(--dim);margin-top:2px}
  /* ── conviction ── */
  .conv{display:flex;flex-direction:column;gap:13px;margin-top:6px}
  .ccard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;border-left:3px solid var(--line)}
  .ccard.Long{border-left-color:var(--grn)} .ccard.Short{border-left-color:var(--red)} .ccard.Watch{border-left-color:var(--amb)}
  .ctop{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:7px}
  .tkr{font-size:clamp(17px,2.2vw,22px);font-weight:720}
  .q{margin-left:auto;font-weight:740;font-size:18px;padding:2px 11px;border-radius:8px}
  .q.grn{background:rgba(63,185,80,.16);color:var(--grn)} .q.amb{background:rgba(214,164,41,.16);color:var(--amb)} .q.gry{background:rgba(139,151,167,.14);color:var(--sub)}
  .lv{font-size:13.5px;color:var(--sub);line-height:1.5}
  .lv .k{margin-right:3px}
  /* ── nav ── */
  #nav{position:fixed;left:0;right:0;bottom:0;height:64px;display:flex;align-items:center;
       justify-content:space-between;padding:0 clamp(20px,5vw,70px);
       background:linear-gradient(0deg,var(--bg) 40%,transparent);z-index:20}
  .navbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--panel);
          color:var(--txt);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;
          transition:border-color .2s,background .2s}
  .navbtn:hover{border-color:var(--risk);background:var(--risk-soft)}
  .navbtn:disabled{opacity:.3;cursor:default}
  .dots{display:flex;gap:9px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:all .25s}
  .dot.on{background:var(--risk);width:22px;border-radius:5px}
  .count{position:fixed;top:26px;right:clamp(20px,5vw,70px);font-size:12.5px;color:var(--dim);letter-spacing:.1em;z-index:20}
  .brand{position:fixed;top:24px;left:clamp(20px,5vw,70px);font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);font-weight:600;z-index:20}
  .brand b{color:var(--risk)}
  .progress{position:fixed;top:0;left:0;height:2px;background:var(--risk);z-index:30;transition:width .42s ease}
  .foot{margin-top:24px;font-size:12px;color:var(--dim);line-height:1.5;max-width:720px}
  /* ── bottleneck explorer (clickable) ── */
  .bt-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;max-height:58vh;overflow-y:auto}
  .bt-theme{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer}
  .bt-head{display:flex;align-items:center;gap:12px;padding:13px 16px}
  .bt-name{font-weight:680;font-size:15px} .bt-leader{margin-left:auto;color:var(--sub);font-size:13px}
  .bt-caret{color:var(--dim);transition:transform .2s} .bt-theme.open .bt-caret{transform:rotate(90deg)}
  .bt-tiers{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
  .bt-theme.open .bt-tiers{max-height:340px;padding:0 16px 12px}
  .bt-tier{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .bt-tier .mono{min-width:62px;font-weight:650} .bt-role{color:var(--sub);flex:1;font-size:12.5px}
  .chip{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12px;margin:4px 5px 0 0;color:var(--sub)}
  /* ── scenario tree ── */
  .scn{display:flex;flex-direction:column;gap:13px;margin-top:6px}
  .scn-branch{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;border-left:3px solid var(--risk)}
  .scn-top{display:flex;align-items:center;gap:13px;margin-bottom:11px}
  .scn-prob{font-size:21px;font-weight:740;color:var(--risk)} .scn-trig{font-size:15px;font-weight:620}
  .scn-assets{display:flex;flex-wrap:wrap;gap:8px}
  .scn-a{font-size:13px;padding:4px 11px;border-radius:7px;font-weight:600}
  .scn-a.up{background:rgba(63,185,80,.14);color:var(--grn)} .scn-a.dn{background:rgba(248,81,73,.14);color:var(--red)}
  /* ── narrative lifecycle ── */
  .nrr{display:flex;flex-direction:column;gap:11px;margin-top:6px}
  .nrr-row{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:center}
  @media(max-width:640px){.nrr-row{grid-template-columns:1fr}}
  .nrr-name{font-size:14px;font-weight:620} .nrr-track{position:relative;height:26px;background:var(--panel);border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .nrr-fill{position:absolute;left:0;top:0;bottom:0;border-radius:7px 0 0 7px;transition:width .6s ease;opacity:.6}
  .nrr-stage{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;white-space:nowrap}
  /* ── portfolio ── */
  .pf{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
  .pf-in{flex:1;min-width:240px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:13px 15px;color:var(--txt);font-size:14px;font-family:inherit}
  .pf-in:focus{outline:none;border-color:var(--risk)}
  .pf-btn{background:var(--risk-soft);border:1px solid var(--risk);color:var(--risk);border-radius:9px;padding:0 22px;font-weight:650;cursor:pointer;font-size:14px}
  .pf-rows{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .pf-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 16px}
  .pf-row .pill{margin-left:auto}
  /* ── mission-control meters ── */
  .meters{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:6px;max-height:62vh;overflow-y:auto}
  .meter{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .meter.off{opacity:.5}
  .m-top{display:flex;align-items:baseline;gap:9px;margin-bottom:9px}
  .m-name{font-weight:680;font-size:15px} .m-val{margin-left:auto;font-size:24px;font-weight:760;font-family:ui-monospace,Menlo,monospace}
  .m-val.gry{font-size:13px;font-weight:600;color:var(--dim)}
  .m-status{font-size:11.5px;color:var(--sub);margin-bottom:9px}
  .m-bar{height:8px;background:var(--panel2);border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-bottom:9px}
  .m-fill{height:100%;border-radius:5px;transition:width .6s ease}
  .m-tags{display:flex;flex-wrap:wrap;gap:5px}
  .m-tag{font-size:10.5px;padding:2px 8px;border-radius:12px;background:var(--panel2);color:var(--sub);border:1px solid var(--line)}
  /* ── thesis beta ── */
  .tb-theme{margin-top:14px} .tb-h{font-size:14px;font-weight:680;margin-bottom:8px}
  .tb-h .mono{color:var(--dim);font-weight:500;font-size:12.5px}
  .tb-grid{display:flex;flex-direction:column;gap:6px}
  .tb-row{display:grid;grid-template-columns:64px 1fr auto auto auto;gap:10px;align-items:center;font-size:12.5px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px}
  .tb-row .mono{font-weight:650} .tb-b{font-weight:700;font-family:ui-monospace,Menlo,monospace}
  .tb-meta{font-size:11px;color:var(--dim)}
  @media(prefers-reduced-motion:reduce){.slide{transition:opacity .01s}.bar .fill{transition:none}}
</style>
</head>
<body>
<div class="progress" id="prog"></div>
<div class="brand">War Room · <b>Morning Brief</b></div>
<div class="count mono" id="count">01 / 06</div>
<div id="stage"></div>
<div id="nav">
  <button class="navbtn" id="prev">‹</button>
  <div class="dots" id="dots"></div>
  <button class="navbtn" id="next">›</button>
</div>

<script>
/* data injected by warroom/brief_export.py; this sample renders standalone */
window.BRIEF = window.BRIEF || /*__BRIEF__*/{
  "date":"Sample — run the app to generate live data",
  "regime":{"structural":"Quad 3","monthly":"Quad 2","operating":"Monthly Q2 inside Structural Q3","why":"RIPE: leading horizon already in Q2 while structural still reads Q3. The Q3→Q2 (Reflation) turn is in motion but not yet confirmed — the window to position ahead of it.","posture":"Defensive"},
  "crash":{"type":"LOW","pressure":34.5,"basis":"no dominant crash driver"},
  "compass":{"state":"MIXED / TRANSITIONING","color":"amb","score":0,"down":3,"up":3,
    "meaning":"The axes disagree — rotation is not aligned. A transition zone: conviction is low because the asset classes aren't confirming each other. Wait for confluence before sizing up.",
    "axes":[
      {"name":"Crypto risk-curve","vote":-1,"verdict":"flight up to BTC — alts lagging","down":"alts / ETH","up":"BTC / stables"},
      {"name":"US sector clock","vote":1,"verdict":"early-cycle — cyclicals leading","down":"discretionary / financials","up":"utilities / staples"},
      {"name":"US factors","vote":1,"verdict":"broad risk-on — small-caps participating","down":"small / value","up":"large / quality"},
      {"name":"FX risk-on/off","vote":1,"verdict":"AUD/JPY rising, USD soft","down":"AUD / EM FX","up":"USD / JPY"},
      {"name":"Commodity complex","vote":-1,"verdict":"gold leading — fear bid","down":"copper / oil","up":"gold"},
      {"name":"DM → EM","vote":-1,"verdict":"capital fleeing EM → DM","down":"EM equities","up":"US / USD"},
      {"name":"IHSG intra-market","vote":0,"verdict":"mixed rotation","down":"coal / metals","up":"big-cap banks"}
    ]},
  "changed":["First run today — no prior snapshot to diff against.","Connect the app and re-run to populate yesterday→today deltas."],
  "conviction":[
    {"ticker":"SNDK","dir":"Long","px":2335.0,"entry":"1754.77–2335.0","stop":1754.77,"target":2475.1,"rr":"1700–2350","quality":71,"why":"bullish formation · near lower band, room to target"}
  ]
};

const B = window.BRIEF;
const RC = {grn:"#3fb950",red:"#f85149",amb:"#d6a429"};
const accent = RC[B.compass?.color] || RC.amb;
document.documentElement.style.setProperty('--risk', accent);
document.documentElement.style.setProperty('--risk-soft', accent+"24");

const esc = s => String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const qcls = q => q>=70?"grn":q>=45?"amb":"gry";

/* ── build the compass gauge (semicircle, needle from score) ── */
function gauge(c){
  const score=c.score||0, n=c.axes?c.axes.length:7;
  const t=Math.max(-1,Math.min(1,score/Math.max(1,n)));        // -1 risk-off … +1 risk-on
  const ang=t*78;                                              // needle angle (deg), left=risk-on
  const col=accent;
  return `<svg class="gauge" viewBox="0 0 200 132">
    <path d="M18 116 A82 82 0 0 1 182 116" fill="none" stroke="#1f2935" stroke-width="13" stroke-linecap="round"/>
    <path d="M18 116 A82 82 0 0 1 100 34" fill="none" stroke="#3fb950" stroke-width="13" stroke-linecap="round" opacity=".55"/>
    <path d="M100 34 A82 82 0 0 1 182 116" fill="none" stroke="#f85149" stroke-width="13" stroke-linecap="round" opacity=".55"/>
    <g transform="rotate(${-ang} 100 116)">
      <line x1="100" y1="116" x2="100" y2="46" stroke="${col}" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="100" cy="116" r="7" fill="${col}"/>
    </g>
    <text x="22" y="130" fill="#3fb950" font-size="9" font-family="monospace">RISK-ON</text>
    <text x="150" y="130" fill="#f85149" font-size="9" font-family="monospace">RISK-OFF</text>
    <text x="100" y="92" fill="${col}" font-size="26" font-weight="700" text-anchor="middle" font-family="monospace">${score>0?"+":""}${score}</text>
    <text x="100" y="108" fill="#8b97a7" font-size="8.5" text-anchor="middle">NET / ${n} AXES</text>
  </svg>`;
}
function axesBars(c){
  return `<div class="axes">`+(c.axes||[]).map(a=>{
    const v=a.vote||0, w=Math.abs(v)*46+4;
    const fill = v>0?`<div class="fill dn" style="width:${w}%"></div>`:v<0?`<div class="fill up" style="width:${w}%"></div>`:"";
    return `<div class="axis"><div class="nm">${esc(a.name)}</div>
      <div><div class="bar"><div class="mid"></div>${fill}</div>
      <div class="vd">${esc(a.verdict)}</div></div></div>`;
  }).join("")+`</div>`;
}

/* ── radar (crash components) ── */
function radar(c){
  const comp=c.components||{}; const keys=Object.keys(comp);
  if(!keys.length) return `<div class="foot">No crash-component data.</div>`;
  const n=keys.length, cx=150, cy=150, R=100;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return [cx+Math.cos(a)*r, cy+Math.sin(a)*r];};
  let rings=""; [0.25,0.5,0.75,1].forEach(f=>{
    const p=keys.map((k,i)=>pt(i,R*f).join(",")).join(" ");
    rings+=`<polygon points="${p}" fill="none" stroke="#1f2935" stroke-width="1"/>`;});
  let axesL="", labels="";
  keys.forEach((k,i)=>{const[x,y]=pt(i,R);const[lx,ly]=pt(i,R+18);
    axesL+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#1f2935" stroke-width="1"/>`;
    labels+=`<text x="${lx}" y="${ly}" fill="#8b97a7" font-size="8.5" text-anchor="middle">${esc(k.replace(/_/g,' '))}</text>`;});
  const poly=keys.map((k,i)=>pt(i,R*Math.max(0,Math.min(1,comp[k]||0))).join(",")).join(" ");
  const dots=keys.map((k,i)=>{const[x,y]=pt(i,R*Math.max(0,Math.min(1,comp[k]||0)));return `<circle cx="${x}" cy="${y}" r="3" fill="${accent}"/>`;}).join("");
  return `<svg viewBox="0 0 300 300" style="max-width:320px;width:100%">${rings}${axesL}
    <polygon points="${poly}" fill="${accent}33" stroke="${accent}" stroke-width="2"/>${dots}${labels}</svg>`;
}
/* ── bottleneck explorer (clickable) ── */
function bottleneckHTML(b){
  const themes=(b&&b.themes)||[];
  const cards=themes.map(t=>`
    <div class="bt-theme" onclick="this.classList.toggle('open')">
      <div class="bt-head"><span class="bt-name">${esc(t.name)}</span>
        <span class="bt-leader mono">${esc(t.leader)} ${t.run>=0?'+':''}${esc(t.run)}%</span>
        <span class="bt-caret">▸</span></div>
      <div class="bt-tiers">${(t.tiers||[]).map(x=>`
        <div class="bt-tier"><span class="mono">${esc(x.ticker)}</span>
          <span class="bt-role">${esc(x.role)}</span>
          <span class="pill ${x.verdict==='QUALIFIES'?'grn':x.verdict==='MARGINAL'?'amb':'gry'}">${esc(x.verdict||'')}</span></div>`).join("")}</div>
    </div>`).join("");
  const dots=((b&&b.next_dots)||[]).map(x=>`<span class="chip">${esc(x.frm)} → ${esc(x.to)}</span>`).join("");
  return `<div class="bt-list">${cards}</div>${dots?`<div class="foot"><span class="k">Where capital is heading next:</span><br>${dots}</div>`:""}`;
}
/* ── scenario tree ── */
function scenarioHTML(sc){
  if(!sc||!sc.length) return `<div class="foot">No active regime transition — no branching scenarios today.</div>`;
  return `<div class="scn">`+sc.map(s=>`
    <div class="scn-branch"><div class="scn-top"><span class="scn-prob mono">${esc(s.prob)}%</span><span class="scn-trig">${esc(s.trigger)}</span></div>
      <div class="scn-assets">${(s.branch||[]).map(a=>`<span class="scn-a ${a[1]==='up'?'up':'dn'}">${esc(a[0])} ${a[1]==='up'?'↑':'↓'}</span>`).join("")}</div></div>`).join("")+`</div>`;
}
/* ── narrative lifecycle ── */
function narrativeHTML(nr){
  if(!nr||!nr.length) return `<div class="foot">No narrative-lifecycle data.</div>`;
  return `<div class="nrr">`+nr.map(t=>{
    const pct=t.num*10, col=t.num>=8?"var(--red)":t.num>=6?"var(--amb)":t.num>=4?"var(--inf)":"var(--grn)";
    return `<div class="nrr-row"><div class="nrr-name">${esc(t.theme)} <span class="mono" style="color:var(--dim)">${esc(t.leader)}</span></div>
      <div class="nrr-track"><div class="nrr-fill" style="width:${pct}%;background:${col}"></div><span class="nrr-stage">${esc(t.stage)} · ${esc(t.num)}/10</span></div></div>`;
  }).join("")+`</div><div class="foot">Accumulation → Markup → Late markup → Distribution. Late-stage = crowded; early-stage = where the next leg of edge lives.</div>`;
}
/* ── portfolio impact (regime-fit, saved locally) ── */
function portfolioHTML(){
  return `<div class="pf"><input id="pfIn" class="pf-in" placeholder="e.g. NVDA long, USO neutral, BTC-USD overweight, BBCA.JK underweight">
    <button class="pf-btn" onclick="pfSave()">Check fit</button></div><div id="pfOut" class="pf-out"></div>`;
}
function pfSave(){const v=(document.getElementById('pfIn').value||"").trim();try{if(v)localStorage.setItem('wr_pf',v);}catch(e){} pfRender(v);}
function pfRender(v){
  const out=document.getElementById('pfOut'); if(!out)return;
  try{v=v||localStorage.getItem('wr_pf')||"";}catch(e){v=v||"";}
  const inp=document.getElementById('pfIn'); if(inp&&!inp.value&&v)inp.value=v;
  if(!v){out.innerHTML='<div class="foot">Enter your positions to see how they fit today\u2019s regime. Saved on this device only.</div>';return;}
  const items=v.split(/[,;]/).map(s=>s.trim()).filter(Boolean);
  const score=(B.compass&&B.compass.score)||0, L=/(long|over)/i, S=/(short|under|cash)/i;
  let net=0; const rows=items.map(it=>{
    const tilt=L.test(it)?1:S.test(it)?-1:0; net+=tilt;
    const fit=((score>1&&tilt>0)||(score<-1&&tilt<0))?["aligned","grn"]:((score>1&&tilt<0)||(score<-1&&tilt>0))?["against regime","red"]:["neutral","amb"];
    return `<div class="pf-row"><span class="mono">${esc(it)}</span><span class="pill ${fit[1]}">${fit[0]}</span></div>`;}).join("");
  const dir=score>1?"risk-on":score<-1?"risk-off":"mixed";
  const rec=(net>0&&score<-1)?"You're net-long into a risk-off tape — consider trimming beta.":(net<0&&score>1)?"You're net-defensive into a risk-on tape — you may be underexposed.":"Your tilt broadly matches today's regime.";
  out.innerHTML=`<div class="pf-rows">${rows}</div><div class="foot"><span class="k">Regime is ${dir} (compass ${score>0?'+':''}${score}).</span> ${esc(rec)}</div>`;
}

/* ── mission-control meters ── */
function metersHTML(mt){
  if(!mt||!mt.length) return `<div class="foot">No meter data.</div>`;
  return `<div class="meters">`+mt.map(m=>{
    const c=`var(--${m.color||'gry'})`;
    const val=m.real&&m.value!=null?`<span class="m-val">${esc(m.value)}</span>`:`<span class="m-val gry">n/a</span>`;
    const bar=m.real&&m.value!=null?`<div class="m-bar"><div class="m-fill" style="width:${Math.max(0,Math.min(100,m.value))}%;background:${c}"></div></div>`:`<div class="m-bar"></div>`;
    return `<div class="meter ${m.real?'':'off'}"><div class="m-top"><span class="m-name">${esc(m.name)}</span>${val}<span class="m-status" style="margin:0 0 0 0;color:${c}">0–100</span></div>
      <div class="m-status">${esc(m.status)}</div>${bar}
      <div class="m-tags">${(m.components||[]).map(x=>`<span class="m-tag">${esc(x)}</span>`).join("")}</div></div>`;
  }).join("")+`</div>`;
}
/* ── thesis beta ── */
function thesisBetaHTML(tb){
  if(!tb||!tb.length) return `<div class="foot">No thesis-beta data (needs the supply-chain tiers populated on live data).</div>`;
  return tb.slice(0,3).map(t=>`<div class="tb-theme"><div class="tb-h">${esc(t.theme)} <span class="mono">leader ${esc(t.leader)} = 1.0β</span></div>
    <div class="tb-grid">${(t.members||[]).map(m=>`<div class="tb-row"><span class="mono">${esc(m.ticker)}</span>
      <div class="m-bar" style="margin:0"><div class="m-fill" style="width:${Math.max(0,Math.min(100,m.beta*40))}%;background:${m.conv>0?'var(--grn)':'var(--amb)'}"></div></div>
      <span class="tb-b">${esc(m.beta)}β</span><span class="tb-meta">conv ${m.conv>0?'+':''}${esc(m.conv)}</span><span class="tb-meta">vol ${esc(m.vol)}</span></div>`).join("")}</div></div>`).join("");
}

/* ── slides ── */
const reg=B.regime||{}, cr=B.crash||{}, cm=B.compass||{}, why=B.why||{}, bk=B.bottleneck||{}, sc=B.scenarios||[], nr=B.narrative||[], mt=B.meters||[], tb=B.thesis_beta||[];
const slides=[
  // 1 cover
  `<div class="eyebrow">Morning Brief · ${esc(B.date||"")}</div>
   <h1>${esc(reg.structural||"—")} <span style="color:var(--dim)">structural</span> · ${esc(reg.monthly||"—")} <span style="color:var(--dim)">monthly</span></h1>
   <p class="lede">${esc(reg.why||reg.operating||"")}</p>
   <div class="foot">Cross-asset compass reads <b class="big">${esc(cm.state||"—")}</b> · crash pressure <b>${esc(cr.type||"—")}</b>. Click → or use arrow keys.</div>`,
  // mission control — meters (only real-data ones; missing feeds flagged)
  `<div class="eyebrow">Mission Control · 30-second scan</div>
   <h2 style="margin-bottom:6px">The meters that have data.</h2>
   <p class="lede" style="font-size:15px;margin-bottom:16px">Composite 0–100 gauges. Greyed = no live feed yet (not faked).</p>
   ${metersHTML(mt)}`,
  // 2 what changed
  `<div class="eyebrow">01 · What changed since yesterday</div>
   <h2>The delta is the signal.</h2>
   <ul class="changed">${(B.changed||[]).slice(0,7).map(x=>`<li>${esc(x)}</li>`).join("")||'<li>No material change recorded.</li>'}</ul>`,
  // WHY causal
  `<div class="eyebrow">02 · Why — the causal chain</div>
   <h2>What's actually driving it.</h2>
   <p class="lede">${esc(why.summary||"Cross-asset drivers resolving today's tape.")}</p>
   ${(why.chains&&why.chains.length)?`<ul class="changed" style="margin-top:18px">${why.chains.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>`:""}
   ${why.bait?`<div class="foot"><span class="k">Policy read:</span> ${esc(why.fed_lean||"")} ${esc(why.bait)}</div>`:""}`,
  // 3 regime
  `<div class="eyebrow">03 · Today's regime</div>
   <h2>${esc(reg.operating||"Regime")}</h2>
   <div class="grid">
     <div class="cell"><span class="k">Structural</span><div class="v">${esc(reg.structural||"—")}</div></div>
     <div class="cell"><span class="k">Monthly</span><div class="v">${esc(reg.monthly||"—")}</div></div>
     <div class="cell"><span class="k">Posture</span><div class="v">${esc(reg.posture||"—")}</div></div>
     <div class="cell"><span class="k">Crash pressure</span><div class="v">${esc(cr.type||"—")}${cr.pressure!=null?` · ${cr.pressure}`:""}</div></div>
   </div>
   <p class="lede" style="margin-top:20px">${esc(reg.why||"")} ${cr.basis?`<br><span style="color:var(--dim)">Crash basis: ${esc(cr.basis)}.</span>`:""}</p>`,
  // 4 compass (signature)
  `<div class="eyebrow">04 · Cross-asset rotation</div>
   <h2 style="margin-bottom:18px">Where is capital flowing — <span class="big">${esc(cm.state||"—")}</span></h2>
   <div class="compass-wrap"><div>${gauge(cm)}</div>${axesBars(cm)}</div>
   <div class="foot">${esc(cm.meaning||"")} &nbsp; Each bar = one axis racing along the same risk curve. Green left = capital rotating <b>down</b> the curve (risk-on); red right = <b>up</b> to safety.</div>`,
  // crash radar
  `<div class="eyebrow">05 · Crash pressure</div>
   <h2>${esc(cr.type||"—")} <span style="color:var(--dim);font-size:.6em">${cr.pressure!=null?`· ${cr.pressure}/100`:""}</span></h2>
   <div class="compass-wrap"><div>${radar(cr)}</div>
     <div><p class="lede">${esc(cr.basis||"")}</p>
     ${cr.bottom?`<div class="foot"><span class="k">Bottom signal:</span> ${esc(cr.bottom)}</div>`:""}
     <div class="foot">Each spoke is one fragility input (0 calm → 1 stressed). A balanced small shape = no dominant driver; a spike = the thing to watch.</div></div></div>`,
  // bottleneck explorer
  `<div class="eyebrow">06 · Bottleneck explorer</div>
   <h2>Click a chain to trace the supply map.</h2>
   ${bottleneckHTML(bk)}`,
  // thesis beta (beta propagation)
  `<div class="eyebrow">07 · Thesis beta — who has leverage</div>
   <h2>Don't buy the theme. Buy the beta to it.</h2>
   <p class="lede" style="font-size:14px;margin-bottom:14px">Each name's beta to the theme leader, from real 120-day returns. Green bar = positive convexity (more upside-beta than downside). High beta + high vol = the trap, not the trade.</p>
   ${thesisBetaHTML(tb)}`,
  // scenario tree
  `<div class="eyebrow">08 · Scenario tree</div>
   <h2>If the regime turns — who moves.</h2>
   ${scenarioHTML(sc)}`,
  // narrative lifecycle
  `<div class="eyebrow">09 · Narrative lifecycle</div>
   <h2>How far each theme has run.</h2>
   ${narrativeHTML(nr)}`,
  // 5 conviction
  `<div class="eyebrow">10 · Highest conviction</div>
   <h2>What to act on — risk range + entry quality on each.</h2>
   <div class="conv">${(B.conviction||[]).slice(0,4).map(c=>`
     <div class="ccard ${esc(c.dir)}">
       <div class="ctop"><span class="pill ${c.dir==='Long'?'grn':c.dir==='Short'?'red':'amb'}">${esc(c.dir)}</span>
         <span class="tkr mono">${esc(c.ticker)}</span><span class="lv">$${esc(c.px)}</span>
         ${c.quality!=null?`<span class="q ${qcls(c.quality)}">${c.quality}</span>`:""}</div>
       <div class="lv"><span class="k">entry</span>${esc(c.entry)} · <span class="k">stop</span>${esc(c.stop)} · <span class="k">target</span>${esc(c.target)}${c.rr?` · <span class="k">range</span>${esc(c.rr)}`:""}</div>
       ${c.asym&&c.asym.up!=null?`<div class="lv" style="margin-top:5px"><span class="k">upside</span> <b style="color:var(--grn)">+${c.asym.up}%</b> · <span class="k">downside</span> <b style="color:var(--red)">${c.asym.dn}%</b> · <span class="k">R:R</span> <b>${c.asym.rr}</b> · <span class="k">EV</span> <b style="color:${c.asym.ev>0?'var(--grn)':'var(--red)'}">${c.asym.ev>0?'+':''}${c.asym.ev}%</b> · <span class="k">P</span> ~${c.asym.prob}% · <span class="k">Kelly</span> ${c.asym.kelly}% · <span class="k">${esc(c.asym.tier)}</span></div>`:""}
       ${c.why?`<div class="lv" style="margin-top:5px;color:var(--dim)">${esc(c.why)}</div>`:""}
     </div>`).join("")||'<div class="ccard">No high-conviction setups today.</div>'}</div>`,
  // portfolio impact
  `<div class="eyebrow">11 · Portfolio impact</div>
   <h2>Your positions vs today's regime.</h2>
   ${portfolioHTML()}
   <div class="foot">No fake P&L — this checks whether your tilt is aligned with today's cross-asset compass, and flags positions fighting the regime. Stored on this device only.</div>`,
  // 6 bottom line
  `<div class="eyebrow">12 · Bottom line</div>
   <h1 style="font-size:clamp(28px,5vw,58px)">${cm.score>2?"Lean in — risk is rotating down the curve.":cm.score<-2?"Defend — capital is fleeing to safety.":"Wait for confluence."}</h1>
   <p class="lede">${esc(cm.meaning||"")}</p>
   <div class="foot">This deck is the 30-second read. The full numbers, per-ticker risk ranges, greeks, and reasoning live in the War Room tabs behind it. Weights are unvalidated priors — walk-forward before sizing.</div>`
];

/* ── engine ── */
const stage=document.getElementById('stage'), dotsEl=document.getElementById('dots'),
      countEl=document.getElementById('count'), progEl=document.getElementById('prog'),
      prevB=document.getElementById('prev'), nextB=document.getElementById('next');
let i=0;
slides.forEach((html,idx)=>{const d=document.createElement('div');d.className='slide';d.innerHTML=html;d.dataset.i=idx;stage.appendChild(d);
  const dot=document.createElement('div');dot.className='dot';dot.onclick=()=>go(idx);dotsEl.appendChild(dot);});
const els=[...stage.children], dots=[...dotsEl.children];
function go(n){
  i=Math.max(0,Math.min(slides.length-1,n));
  els.forEach((e,x)=>{e.classList.toggle('active',x===i);e.classList.toggle('prev',x<i);});
  dots.forEach((d,x)=>d.classList.toggle('on',x===i));
  countEl.textContent=String(i+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
  progEl.style.width=((i+1)/slides.length*100)+'%';
  prevB.disabled=i===0;nextB.disabled=i===slides.length-1;
}
nextB.onclick=()=>go(i+1);prevB.onclick=()=>go(i-1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(i+1);if(e.key==='ArrowLeft')go(i-1);});
let sx=0;stage.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)go(i+(dx<0?1:-1));},{passive:true});
go(0); try{pfRender();}catch(e){}
</script>
</body>
