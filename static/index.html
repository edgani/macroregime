<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>War Room OS v3</title>
<style>
:root{--bg:#071019;--panel:#0e1a25;--panel2:#132333;--text:#e8f0f7;--muted:#8fa4b7;--line:#24394a;--good:#5de1a5;--warn:#f3c969;--bad:#ff7b83;--accent:#71b7ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(7,16,25,.96);z-index:3}
h1{font-size:18px;margin:0;letter-spacing:.04em}.badge{padding:6px 9px;border-radius:99px;font-size:11px;font-weight:700;background:#253241;color:var(--warn)}
main{max-width:1450px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px}.span3{grid-column:span 3}.span4{grid-column:span 4}.span6{grid-column:span 6}.span12{grid-column:span 12}
.label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.09em}.value{font-size:25px;font-weight:700;margin-top:6px}.small{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-weight:600}.pill{display:inline-block;padding:4px 7px;border-radius:7px;background:#1a2a38;font-size:10px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}
.bar{height:7px;border-radius:9px;background:#203444;overflow:hidden}.fill{height:100%;background:var(--accent)}.asset-title{display:flex;justify-content:space-between;align-items:center}.locked{border:1px dashed #7d6432;background:#211d12;color:var(--warn);padding:12px;border-radius:10px;margin-top:12px}.error{color:var(--bad)}
@media(max-width:900px){.span3,.span4,.span6{grid-column:span 12}header{padding:14px}main{padding:12px}}
</style>
</head>
<body>
<header><h1>WAR ROOM OS v3</h1><div><span id="health" class="badge">LOADING</span> <span class="badge">RESEARCH ONLY</span></div></header>
<main>
<div class="grid" id="summary"></div>
<div class="grid" id="assets" style="margin-top:14px"></div>
<div class="card locked"><strong>Capital gate locked.</strong> This surface is descriptive only. No probability, entry, target, stop, sizing, PAPER, or LIVE action is generated until version-bound evidence gates pass.</div>
</main>
<script>
const fmt=n=>n==null?'—':(Math.abs(n)>=100?Number(n).toFixed(2):Number(n).toFixed(4));
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
function stateClass(s){return s==='BULLISH'||s==='EXPANSION'?'good':s==='BEARISH'?'bad':'warn'}
async function load(){
 try{
  const [status,assets]=await Promise.all([fetch('/api/status').then(r=>r.json()),fetch('/api/assets').then(r=>r.json())]);
  document.getElementById('health').textContent=status.store_errors.length?'STORE ERROR':'SYSTEM HEALTHY';
  document.getElementById('health').className='badge '+(status.store_errors.length?'bad':'good');
  document.getElementById('summary').innerHTML=`
   <div class="card span3"><div class="label">Mode</div><div class="value">${esc(status.mode)}</div><div class="small">Actionable: NO</div></div>
   <div class="card span3"><div class="label">Prospective batches</div><div class="value">${status.prospective_batches}</div></div>
   <div class="card span3"><div class="label">Observations</div><div class="value">${status.observations}</div></div>
   <div class="card span3"><div class="label">Matured outcomes</div><div class="value">${status.outcomes}</div></div>`;
  document.getElementById('assets').innerHTML=assets.items.map(renderAsset).join('');
 }catch(e){document.getElementById('assets').innerHTML=`<div class="card span12 error">${esc(e)}</div>`}
}
function renderAsset(a){
 if(a.status==='UNAVAILABLE')return `<div class="card span6"><div class="asset-title"><h2>${esc(a.asset)}</h2><span class="pill bad">UNAVAILABLE</span></div><div class="small">${esc(a.reason_codes?.join(', '))}</div></div>`;
 const mtf=a.mtf||{}; const rows=Object.entries(a.timeframes||{}).map(([tf,t])=>{
  if(!t)return `<tr><td>${tf}</td><td colspan="5">UNAVAILABLE</td></tr>`;
  const mqa=t.component_states.mqa_benchmarks,mom=t.component_states.momentum_axes;
  return `<tr><td>${tf}</td><td>${fmt(mqa.close)}</td><td class="${stateClass(mqa.volatility_state)}">${esc(mqa.volatility_state)}</td><td>${fmt(mqa.prior_range_location)}</td><td>${fmt(mom.trend_context)}</td><td>${fmt(mom.exhaustion_risk)}</td></tr>`}).join('');
 return `<div class="card span6"><div class="asset-title"><h2>${esc(a.asset)}</h2><span class="pill">DESCRIPTIVE ONLY</span></div>
 <div class="grid"><div class="span4"><div class="label">MTF alignment</div><div class="value">${fmt((mtf.alignment_score||0)*100)}%</div></div><div class="span4"><div class="label">Risk ceiling</div><div class="value">${fmt(mtf.risk_multiplier_ceiling)}×</div></div><div class="span4"><div class="label">Conflict</div><div class="value" style="font-size:14px">${esc((mtf.conflict_codes||[]).join(', ')||'NONE')}</div></div></div>
 <table><thead><tr><th>TF</th><th>Close</th><th>Vol state</th><th>Location</th><th>Trend context</th><th>Exhaustion</th></tr></thead><tbody>${rows}</tbody></table></div>`
}
load();setInterval(load,60000);
</script>
</body></html>
