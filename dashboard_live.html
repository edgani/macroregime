<script>
(() => {
'use strict';
const D = window.DASHBOARD_DATA || {};
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const arr = x => Array.isArray(x) ? x : [];
const obj = x => x && typeof x === 'object' ? x : {};
const num = x => { const n=Number(x); return Number.isFinite(n)?n:null; };
const fmt = x => x===null||x===undefined||x===''?'—':String(x);
const money = x => { const n=num(x); if(n===null)return '—'; const a=Math.abs(n); return (n<0?'-':'')+'$'+(a>=1e9?(a/1e9).toFixed(1)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0)); };
const pct = x => { const n=num(x); return n===null?'—':(n>0?'+':'')+n.toFixed(1)+'%'; };
const timeLabel = x => { if(!x)return '—'; try { const d=new Date(x); return isNaN(d)?String(x).slice(0,19):d.toISOString().replace('T',' ').slice(0,19)+'Z'; } catch(e){return String(x).slice(0,19);} };
const short = (s,n=58) => String(s??'').length>n?String(s).slice(0,n-1)+'…':String(s??'');
const normalizeState = s => { const v=String(s??'').toUpperCase(); if(/LIVE|BULL|LONG|EXPAND|ACCUM|IMPROV|POSITIVE|CONSTRUCT/.test(v))return 'constructive'; if(/BEAR|SHORT|CONTRACT|DISTRIB|DETERIOR|NEGATIVE|RISK|CRITICAL|ERROR|BROKEN/.test(v))return 'destructive'; if(/WATCH|MIXED|PARTIAL|WAIT|TRANSITION|GUARDED|STANDBY/.test(v))return 'watch'; if(/NO_DATA|NOT_CONFIGURED|EMPTY|UNAVAILABLE|NONE|—/.test(v))return 'no_data'; return 'neutral'; };
const sourceState = obj(D.data_health).overall || obj(D.meta).source || 'NO_DATA';

const NAV = [
 {group:'COMMAND',items:[['mc','⌖','MISSION CONTROL'],['macro','◈','MACRO & REGIME'],['ew','⚠','EARLY WARNING']]},
 {group:'OPPORTUNITY',items:[['alpha','◆','ALPHA CENTER'],['inst','◎','INSTITUTIONAL']]},
 {group:'MARKETS',items:[['us','▦','US STOCKS'],['ihsg','▥','IHSG'],['crypto','⬡','CRYPTO'],['commod','◇','COMMODITIES'],['fx','⇄','FX']]},
 {group:'INTELLIGENCE',items:[['flow','⟿','FLOW & ROTATION'],['sc','⌁','SUPPLY CHAIN'],['co','▣','COMPANY INTEL'],['kg','✣','KNOWLEDGE GRAPH']]},
 {group:'CONTROL',items:[['rc','✓','VALIDATION CENTER']]}
];
const savedState=(()=>{try{return JSON.parse(localStorage.getItem('warroom_ui_state')||'{}')}catch(_){return {}}})();
let state={view:savedState.view||'mc',mode:savedState.mode||'observed',selected:null,search:''};
function persistState(){try{localStorage.setItem('warroom_ui_state',JSON.stringify({view:state.view,mode:state.mode}))}catch(_){}}

function renderSidebar(){
 const counts={alpha:state.mode==='all'?arr(D.alpha).length:0,inst:arr(obj(D.institutional).events).length};
 document.getElementById('sidebar').innerHTML=NAV.map(g=>`<div class="nav-group">${g.group}</div>${g.items.map(([id,ico,label])=>`<button class="nav-item ${state.view===id?'active':''}" data-view="${id}"><span class="ico">${ico}</span>${label}${counts[id]?`<span class="nav-badge">${counts[id]}</span>`:''}</button>`).join('')}`).join('')+`<div class="sidebar-foot"><div class="label">PRODUCTION RULE</div><div class="value">Missing feed = NO DATA.<br>Synthetic data is disabled unless explicit test mode.</div></div>`;
 document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.selected=null;persistState();render();});
}

function renderTop(){
 const sys=obj(D.systemic), health=obj(D.data_health), inst=obj(D.institutional);
 const dot=health.overall==='LIVE'?'live':health.overall==='PARTIAL'?'partial':'bad';
 const feeds=arr(health.sources); const good=feeds.filter(x=>x.state==='LIVE').length;
 const chips=[
  `<span class="status-dot ${dot}"></span><b>${esc(health.overall||obj(D.meta).source||'NO_DATA')}</b>`,
  `REGIME <b>${esc(sys.quad_name||sys.quad||'NO_DATA')}</b>`,
  `LIQUIDITY <b>${esc(short(sys.liquidity||'NO_DATA',24))}</b>`,
  `SOURCES <b>${good}/${feeds.length||0}</b>`,
  `INSTITUTIONAL <b>${esc(inst.overall_state||'NOT_LOADED')}</b>`,
  `UPDATED <b>${esc(timeLabel(obj(D.meta).generated))}</b>`
 ];
 document.getElementById('topMetrics').innerHTML=chips.map((x,i)=>`<div class="top-chip">${i===0?x:x}</div>`).join('');
}

function node(id,label,sub,value,stateName='neutral',evidence='observed',extra={}){return {id,label,sub,value,state:normalizeState(stateName),evidence,...extra};}
function edge(from,to,stateName='neutral',evidence='observed',label='',width=1.7){return {from,to,state:normalizeState(stateName),evidence,label,width};}
function layered(layers){
 const nodes=[]; const edges=[]; const xPad=72, width=856, top=55, bottom=555;
 layers.forEach((layer,li)=>{
  const y=layers.length===1?300:top+(bottom-top)*li/(layers.length-1); const n=layer.length;
  layer.forEach((nd,ni)=>{const x=n===1?500:xPad+(width)*(ni/(n-1)); nd.x=x;nd.y=y;nodes.push(nd);});
 });
 return {nodes,edges};
}
function connectAll(graph,fromLayer,toLayer,stateName='neutral',evidence='observed'){
 fromLayer.forEach(a=>toLayer.forEach(b=>graph.edges.push(edge(a.id,b.id,stateName,evidence))));
}
function basicRail(title,desc,current,next,alt,invalidation,windowText,confidence=0,action='WATCH / WAIT FOR CONFIRMATION'){
 return {title,desc,current,next,alternative:alt,invalidation,window:windowText,confidence,action};
}

function marketSetups(id){return arr(obj(obj(D.markets)[id]).setups).filter(x=>x&&x.tk&&x.tk!=='—');}
function marketObj(id){return obj(obj(D.markets)[id]);}
function firstCandidates(limit=8){
 const out=[];
 // Default OBSERVED mode can surface only tickers that cleared a live market/setup path.
 Object.values(obj(D.markets)).forEach(m=>arr(m.setups).forEach(s=>s.tk&&s.tk!=='—'&&out.push({ticker:s.tk,score:num(s.conv)||0,why:s.why,stage:s.act||s.ty,evidence:'observed'})));
 // Structural discovery candidates are visible only when the user explicitly enables ALL LAYERS.
 if(state.mode==='all')arr(D.alpha).forEach(a=>a.tk&&out.push({ticker:a.tk,score:num(a.asymmetry)||0,why:a.node||a.scarcity||a.stage,stage:a.stage||'ALPHA',evidence:'structural'}));
 const seen=new Set(); return out.filter(x=>!seen.has(x.ticker)&&seen.add(x.ticker)).sort((a,b)=>b.score-a.score).slice(0,limit);
}

function modelMission(){
 const sys=obj(D.systemic), markets=obj(D.markets);
 const l0=[node('liq','GLOBAL LIQUIDITY','observed macro inputs',short(sys.liquidity||'NO_DATA',18),sys.liquidity)];
 const l1=[node('regime','REGIME',`growth ${fmt(sys.growth_roc)} · inflation ${fmt(sys.infl_roc)}`,sys.quad_name||sys.quad||'NO_DATA',sys.quad_name||sys.quad)];
 const ids=[['us','US'],['idx','IHSG'],['crypto','CRYPTO'],['commodity','COMMOD'],['fx','FX']];
 const l2=ids.map(([id,label])=>{const m=obj(markets[id]);return node('m_'+id,label,`${obj(m.funnel).setups||0} surfaced`,m.bias||'NO_DATA',m.bias);});
 const cands=firstCandidates(6); const l3=cands.length?cands.map((c,i)=>node('c_'+i,c.ticker,short(c.why,34),c.stage||'CANDIDATE',c.stage,c.evidence||'observed',{raw:c})):[];
 const g=layered([l0,l1,l2,l3.length?l3:[node('none','NO ACTIONABLE TICKER','conviction gate emitted nothing','NO_DATA','NO_DATA')]]);
 connectAll(g,l0,l1,sys.liquidity); connectAll(g,l1,l2,sys.quad_name||'watch');
 l2.forEach((m,i)=>{const targets=g.nodes.filter(n=>n.id.startsWith('c_')).filter((_,j)=>j%l2.length===i%l2.length); targets.forEach(t=>g.edges.push(edge(m.id,t.id,t.state,'inferred')));});
 const rotationsIn=arr(sys.rotation_in), rotationsOut=arr(sys.rotation_out);
 return {title:'MISSION CONTROL',sub:'World → regime → market → candidate. Default view shows observed data; inferred routes are dashed.',canvas:'GLOBAL CAPITAL STATE',badges:['observed','inferred'],graph:g,
  rail:basicRail(`Quad ${fmt(sys.quad||'—')} · ${fmt(sys.quad_name||'NO_DATA')}`,
   `Liquidity: ${fmt(sys.liquidity)}. Cross-asset: ${fmt(sys.cross_asset)}.`,
   rotationsIn.length?`Rotation-in candidates: ${rotationsIn.join(', ')}`:'No validated rotation-in list.',
   firstCandidates(3).map(x=>x.ticker).join(' → ')||'Wait for data and conviction gates.',
   rotationsOut.length?`Rotation-out: ${rotationsOut.join(', ')}`:'Alternative path not confirmed.',
   `Shock ${fmt(sys.shock_prob)} · Fragility ${fmt(sys.fragility)}`,'Driven by active regime horizon',55,'OPEN THE STRONGEST EVIDENCE PATH'),
  ledger:arr(obj(D.data_health).sources).slice(0,14).map(x=>({time:obj(D.meta).generated,ticker:x.provider,desc:`${x.dataset}: ${x.note}`,state:x.state})), queue:firstCandidates(8)};
}

function modelMacro(){
 const s=obj(D.systemic); const drivers=[
  node('growth','GROWTH','rate of change',fmt(s.growth_roc),s.growth_roc>0?'constructive':s.growth_roc<0?'destructive':'NO_DATA'),
  node('infl','INFLATION','rate of change',fmt(s.infl_roc),s.infl_roc>0?'watch':s.infl_roc<0?'constructive':'NO_DATA'),
  node('liqm','LIQUIDITY','Fed/Treasury/credit',short(s.liquidity,16),s.liquidity),
  node('credit','CREDIT','HY OAS / funding',fmt(s.fragility),s.fragility),
  node('policy','POLICY','rates / QT / fiscal','NO_DATA','NO_DATA'),
 ];
 const regime=[node('macroreg','FORWARD REGIME',`quad ${fmt(s.quad)}`,s.quad_name||'NO_DATA',s.quad_name)];
 const outputs=[node('risk','RISK ASSETS','cross-asset',s.cross_asset||'NO_DATA',s.cross_asset),node('def','DEFENSIVES','shock sensitivity',fmt(s.shock_prob),s.shock_prob),node('em','EM ROTATION','regional confirmation',Object.keys(obj(D.regional)).length?'AVAILABLE':'NO_DATA',Object.keys(obj(D.regional)).length?'watch':'NO_DATA')];
 const g=layered([drivers,regime,outputs]); connectAll(g,drivers,regime,'watch'); connectAll(g,regime,outputs,s.quad_name||'watch');
 return {title:'MACRO & REGIME',sub:'Drivers are separated from the inferred regime and its market transmission.',canvas:'MACRO TRANSMISSION MAP',badges:['observed','inferred'],graph:g,
 rail:basicRail(s.quad_name||'NO_DATA',`Growth RoC ${fmt(s.growth_roc)} · Inflation RoC ${fmt(s.infl_roc)}.`, `Liquidity ${fmt(s.liquidity)}`,`Confirm through price, breadth and credit before allocation.`,`Market-implied regime can disagree with economic data.`,`Regime invalidates when its underlying driver directions reverse.`,'Structural / monthly / weekly / daily',50,'USE AS FILTER, NOT A STANDALONE TRADE'),
 ledger:arr(obj(D.data_health).sources).filter(x=>/macro|FRED|_proxy/i.test(`${x.dataset} ${x.provider}`)).map(x=>({time:obj(D.meta).generated,ticker:x.provider,desc:x.note,state:x.state})),queue:firstCandidates(6)};
}

function modelEarly(){
 const s=obj(D.systemic); const first=[node('val','VALUATION','market excess','NO_DATA','NO_DATA'),node('breadth','BREADTH','participation','NO_DATA','NO_DATA'),node('liqstress','LIQUIDITY','funding stress',short(s.liquidity,14),s.liquidity),node('frag','FRAGILITY','systemic',fmt(s.fragility),s.fragility)];
 const mid=[node('vol','VOLATILITY','stress transmission',fmt(s.shock_prob),s.shock_prob),node('credit2','CREDIT SPREADS','confirmation',fmt(s.fragility),s.fragility)];
 const end=[node('riskstate','RISK STATE','not a forecast',s.defer_longs?'DEFER LONGS':'MONITOR',s.defer_longs?'destructive':'watch')];
 const g=layered([first,mid,end]); connectAll(g,first,mid,'watch','inferred');connectAll(g,mid,end,s.defer_longs?'destructive':'watch','inferred');
 return {title:'EARLY WARNING',sub:'Shows where stress begins, how it transmits, and what must confirm before a risk call.',canvas:'RISK PROPAGATION NETWORK',badges:['observed','inferred'],graph:g,
 rail:basicRail(s.defer_longs?'DEFENSIVE POSTURE':'NO SYSTEMIC CONFIRMATION',`Shock probability: ${fmt(s.shock_prob)} · Fragility: ${fmt(s.fragility)}.`,`Current state is a conditional warning, not a crash prediction.`,`Watch breadth → credit → volatility sequence.`,`False alarm if breadth and credit recover while liquidity improves.`,`Invalidation comes from source metrics, not price narrative.`,'Event-dependent',s.defer_longs?70:35,s.defer_longs?'REDUCE FRAGILITY / DEFER NEW LONGS':'MONITOR CONFIRMATION'),
 ledger:arr(obj(D.data_health).sources).slice(0,12).map(x=>({time:obj(D.meta).generated,ticker:x.provider,desc:x.note,state:x.state})),queue:[]};
}

function modelAlpha(){
 const A=arr(D.alpha);
 if(state.mode!=='all')return emptyModel('ALPHA CENTER','OBSERVED mode hides structural discovery candidates until they have a live market/setup evidence path. Switch to ALL LAYERS to inspect research hypotheses.');
 if(!A.length)return emptyModel('ALPHA CENTER','No structural candidate is available from the alpha research contract.');
 const nodes=A.slice(0,18).map((a,i)=>{const score=num(a.asymmetry)||0; const angle=(i/A.length)*Math.PI*2; const radius=130+(i%3)*58; return node('a_'+i,a.tk,`${String(a.market||'').toUpperCase()} · ${a.stage||'stage —'}`,`ASYM ${score}`,score>=70?'constructive':score>=50?'watch':'neutral','structural',{x:500+Math.cos(angle)*radius,y:310+Math.sin(angle)*radius,raw:a});});
 const center=node('alpha_core','ALPHA RESEARCH GATE','macro → bottleneck → mispricing','HYPOTHESIS',A.length?'watch':'NO_DATA','inferred',{x:500,y:310});
 const g={nodes:[center,...nodes],edges:nodes.map(n=>edge('alpha_core',n.id,n.state,'structural',''))};
 return {title:'ALPHA CENTER',sub:'Structural opportunity constellation. These are hypotheses, not live Mission Control actions.',canvas:'OPPORTUNITY CONSTELLATION',badges:['structural','inferred'],graph:g,
 rail:basicRail(A[0].tk,`${A[0].node||A[0].scarcity||'Top structural hypothesis'} · tier ${fmt(A[0].tier)}.`,`Stage: ${fmt(A[0].stage)} · scarcity: ${fmt(A[0].scarcity)}`,`Require live market, institutional and price confirmation before promotion.`,`Most high-asymmetry hypotheses fail; structural upside is not a return forecast.`,`Kill thesis and data gates must be explicit.`,'Candidate-specific',Math.min(65,num(A[0].asymmetry)||35),'OPEN RESEARCH TRACE'),
 ledger:A.slice(0,12).map(a=>({time:obj(D.meta).generated,ticker:a.tk,desc:`STRUCTURAL · ${a.node||a.scarcity} · gated: ${arr(a.gated).join(', ')||'none'}`,state:'watch'})),queue:A.slice(0,8).map(a=>({ticker:a.tk,score:num(a.asymmetry)||0,why:a.node||a.scarcity,stage:`STRUCTURAL · ${a.stage||'hypothesis'}`}))};
}

function modelInstitutional(){
 const I=obj(D.institutional), statuses=arr(I.statuses), events=arr(I.events); const providers=statuses.length?statuses:[
  {provider:'Unusual Whales',dataset:'options_flow',state:'NOT_CONFIGURED',note:'Set API key'},
  {provider:'Massive / UW',dataset:'dark_pool',state:'NOT_CONFIGURED',note:'Set API key'},
  {provider:'SEC EDGAR',dataset:'filings',state:'NOT_LOADED',note:'Direct public feed'},
  {provider:'Nansen',dataset:'smart_money',state:'NOT_CONFIGURED',note:'Set API key'},
  {provider:'Arkham',dataset:'labeled_transfers',state:'NOT_CONFIGURED',note:'Set API key'}];
 const pnodes=providers.map((p,i)=>node('p_'+i,p.provider,p.dataset,p.state,p.state,'observed',{raw:p}));
 const tickers=[...new Set(events.map(e=>e.ticker).filter(Boolean))].slice(0,8).map((t,i)=>node('it_'+i,t,'cross-evidence target',`${events.filter(e=>e.ticker===t).length} events`,'watch','observed',{raw:{ticker:t,events:events.filter(e=>e.ticker===t)}}));
 const score=node('iscore','POSITIONING ENGINE','intent remains probabilistic',events.length?'EVIDENCE ACTIVE':'NO EVENTS',events.length?'watch':'NO_DATA','inferred');
 const g=layered([pnodes,[score],tickers.length?tickers:[node('ino','NO LIVE INSTITUTIONAL EVENTS','credentials or feed required','NO_DATA','NO_DATA')]]);connectAll(g,pnodes,[score],'watch');connectAll(g,[score],tickers.length?tickers:[g.nodes[g.nodes.length-1]],'watch','inferred');
 const lead=events[0];
 return {title:'INSTITUTIONAL POSITIONING',sub:'Options, TRF prints, filings and on-chain Smart Money. Events are evidence—not automatic positions.',canvas:'INSTITUTIONAL EVIDENCE MAP',badges:['observed','inferred'],graph:g,
 rail:basicRail(lead?`${lead.ticker} · ${lead.event_type}`:(I.overall_state||'NOT CONFIGURED'),lead?eventDescription(lead):'Connect provider keys. SEC can run without a paid market-data key.',`Observed events: ${events.length}. Active feeds: ${providers.filter(p=>p.state==='LIVE').length}.`,`Cluster repeated evidence and reconcile options with next-day OI / price response.`,`Single prints, hedges, rolls and custody transfers can be noise.`,`Invalidate the inference when follow-through or independent evidence fails.`,'Seconds to quarters by source',lead?60:0,lead?'OPEN RAW EVENT / CROSS-CHECK':'CONFIGURE DATA SOURCES'),
 ledger:events.slice(0,30).map(e=>({time:e.timestamp,ticker:e.ticker||e.provider,desc:eventDescription(e),state:eventState(e)})),queue:institutionalQueue(events)};
}

function eventDescription(e){
 if(e.event_type==='OPTIONS_FLOW')return `${e.option_type||''} ${e.contract||''} · ${money(e.premium)} · ${arr(e.flags).join('/')||e.classification||'trade-side'}`;
 if(e.event_type==='DARK_POOL')return `TRF print ${money(e.premium)} @ ${fmt(e.price)} · ${e.nbbo_location||'location unknown'} · intent unconfirmed`;
 if(e.event_type==='SEC_FILING')return `${e.form} · ${e.description||e.company||'SEC filing'}`;
 if(e.event_type==='SMART_MONEY')return `${e.chain||''} · holdings ${money(e.value_usd)} · 24h ${pct(e.change_24h_pct)}`;
 if(e.event_type==='ARKHAM_TRANSFER')return `${e.chain||''} · ${e.from_entity||'unknown'} → ${e.to_entity||'unknown'} · ${money(e.value_usd)} · intent unconfirmed`;
 return short(JSON.stringify(e),100);
}
function eventState(e){if(e.event_type==='SMART_MONEY')return normalizeState(e.classification); if(e.event_type==='OPTIONS_FLOW')return /CALL_ASK|PUT_BID/.test(e.classification||'')?'constructive':/PUT_ASK|CALL_BID/.test(e.classification||'')?'destructive':'watch'; return 'watch';}
function institutionalQueue(events){const m={};events.forEach(e=>{const t=e.ticker||'—';if(!m[t])m[t]={ticker:t,score:0,why:[],stage:'EVIDENCE'};m[t].score+=e.event_type==='SEC_FILING'?18:e.event_type==='OPTIONS_FLOW'?12:e.event_type==='DARK_POOL'?9:10;m[t].why.push(e.event_type);});return Object.values(m).sort((a,b)=>b.score-a.score).slice(0,8).map(x=>({...x,why:[...new Set(x.why)].join(' + ')}));}

function modelMarket(id,title){
 const m=marketObj(id), setups=marketSetups(id), drivers=arr(m.drivers);
 const l0=drivers.length?drivers.slice(0,6).map((d,i)=>node('d_'+i,String(d).replaceAll('_',' ').toUpperCase(),'market-specific driver','INPUT','neutral','structural',{raw:d})):[node('dn','DRIVER FEEDS','none mapped','NO_DATA','NO_DATA')];
 const l1=[node('mbias',title+' STATE',`${obj(m.funnel).universe||0} loaded`,m.bias||'NO_DATA',m.bias)];
 const l2=setups.length?setups.slice(0,10).map((s,i)=>node('s_'+i,s.tk,short(s.why,35),s.act||s.ty||'SETUP',s.act||s.ty,'observed',{raw:s})):[node('sn','NO SURFACED TICKER','conviction gate not met','NO_DATA','NO_DATA')];
 const g=layered([l0,l1,l2]);connectAll(g,l0,l1,'watch','structural');connectAll(g,l1,l2,m.bias||'watch','inferred');
 const top=setups[0];
 const special=id==='ihsg'?'IHSG remains long-only; bearish state means wait/reduce, never short.':id==='crypto'?'Wallet/entity flows are separated from protocol TVL and price proxies.':'Market setup requires driver, price and execution agreement.';
 return {title,sub:special,canvas:`${title} DECISION MAP`,badges:['observed','structural','inferred'],graph:g,
 rail:basicRail(top?`${top.tk} · ${top.act}`:(m.bias||'NO_DATA'),top?top.why:`No ticker cleared the gate. Bias: ${fmt(m.bias)}.`,top?`Entry ${fmt(top.e)} · stop ${fmt(top.s)} · target ${fmt(top.t)} · R/R ${fmt(top.rr)}`:'Keep the market state visible without inventing an opportunity.',`Next candidate appears only after full funnel and data checks.`,`Alternative path: market bias can rotate while no individual ticker qualifies.`,top?(top.warn||`Invalidation ${fmt(top.s)}`):'No setup means no trade-level invalidation.','Setup-specific',top?Math.min(95,num(top.conv)||0):0,top?top.act:'NO ACTION'),
 ledger:setups.map(s=>({time:obj(D.meta).generated,ticker:s.tk,desc:`${s.act} · ${s.why} · entry ${fmt(s.e)} / stop ${fmt(s.s)} / target ${fmt(s.t)}`,state:s.act})),queue:setups.slice(0,8).map(s=>({ticker:s.tk,score:num(s.conv)||0,why:s.why,stage:s.act||s.ty}))};
}

function modelFlow(){
 const s=obj(D.systemic), ins=arr(s.rotation_in), outs=arr(s.rotation_out);
 const l0=[node('cash','GLOBAL LIQUIDITY','macro impulse',short(s.liquidity,17),s.liquidity)];
 const l1=[node('out','ROTATING OUT','confirmed list',outs.length?outs.join(', '):'NO_DATA',outs.length?'destructive':'NO_DATA'),node('reg','REGIME FILTER','cross asset',s.cross_asset||s.quad_name||'NO_DATA',s.cross_asset||s.quad_name)];
 const marketNodes=Object.entries(obj(D.markets)).map(([id,m])=>node('fm_'+id,(m.label||id).toUpperCase(),`${obj(m.funnel).setups||0} setups`,m.bias||'NO_DATA',m.bias));
 const l3=ins.length?ins.slice(0,10).map((t,i)=>node('rin_'+i,t,'rotation-in output','WATCH', 'watch','inferred',{raw:t})):[node('rin0','NO ROTATION-IN','no validated list','NO_DATA','NO_DATA')];
 const g=layered([l0,l1,marketNodes,l3]);connectAll(g,l0,l1,s.liquidity);connectAll(g,l1,marketNodes,'watch','inferred');connectAll(g,marketNodes,l3,'watch','inferred');
 return {title:'FLOW & ROTATION',sub:'Magnitude, acceleration and persistence require real flow sources; price rotation is labeled inferred.',canvas:'CAPITAL ROTATION MAP',badges:['observed','inferred'],graph:g,
 rail:basicRail(ins.length?`ROTATING INTO ${ins.join(', ')}`:'NO CONFIRMED ROTATION',`Rotating out: ${outs.join(', ')||'none confirmed'}.`,`Current flow view uses only available sources and does not pretend dollar flows reconcile across providers.`,`Follow the path with improving persistence and remaining return.`,`Price-only rotation can reverse without actual fund-flow confirmation.`,`Invalidate when driver and flow direction disagree.`,'Front-run → current → late → exhausted',ins.length?60:10,'OPEN MARKET PATH'),ledger:arr(obj(D.data_health).sources).map(x=>({time:obj(D.meta).generated,ticker:x.provider,desc:x.note,state:x.state})),queue:firstCandidates(8)};
}

function selectedChain(){const chains=arr(obj(obj(D.reference).chain_reactions).chains);return chains[0]||null;}
function modelSupply(){
 const c=selectedChain(); if(!c)return emptyModel('SUPPLY CHAIN','No chain-reaction reference loaded.');
 const seq=arr(c.propagation_sequence).slice(0,7); const layers=[[node('trigger','TRIGGER',short(c.trigger_event,62),c.trigger_status||'STRUCTURAL',c.trigger_status,'structural',{raw:c})]];
 seq.forEach((s,i)=>layers.push([node('tier_'+i,`TIER ${s.tier} · STEP ${s.step}`,short(s.role,48),arr(s.tickers).slice(0,5).join(' · '),s.tier<=2?'constructive':'watch','structural',{raw:s})]));
 const g=layered(layers); for(let i=0;i<layers.length-1;i++)connectAll(g,layers[i],layers[i+1],'watch','structural');
 return {title:'SUPPLY CHAIN',sub:`Structural reference: ${c.name}. Topology is curated; live activation must be independently observed.`,canvas:'BOTTLENECK CASCADE',badges:['structural'],graph:g,
 rail:basicRail(c.name,short(c.mechanism,220),`Trigger status in reference: ${fmt(c.trigger_status)}.`,`Identify which tier is newly binding and still mispriced.`,`A theme can be real while a selected ticker fails to capture value.`,`Invalidate via capacity response, substitution, demand slowdown or broken pricing power.`,c.horizon||'Structural',45,'SELECT A TIER / VERIFY LIVE EVIDENCE'),
 ledger:seq.map(s=>({time:obj(obj(D.reference).chain_reactions)._schema_version,ticker:arr(s.tickers).slice(0,5).join(', '),desc:`${s.role} · ${s.rationale}`,state:'STRUCTURAL'})),queue:seq.flatMap(s=>arr(s.tickers).slice(0,2).map(t=>({ticker:t,score:Math.max(1,100-s.tier*14),why:s.role,stage:`TIER ${s.tier}`}))).slice(0,8)};
}

function modelCompany(){
 const cand=firstCandidates(1)[0]; if(!cand)return emptyModel('COMPANY INTEL','No company/ticker selected because no candidate cleared the current gates.');
 const t=cand.ticker, events=arr(obj(D.institutional).events).filter(e=>e.ticker===t), setup=Object.values(obj(D.markets)).flatMap(m=>arr(m.setups)).find(s=>s.tk===t), alpha=arr(D.alpha).find(a=>a.tk===t);
 const l0=[node('co','COMPANY / TOKEN',cand.why||'candidate',t,'watch','observed',{raw:{cand,setup,alpha,events}})];
 const l1=[node('value','VALUE CAPTURE','bottleneck / role',alpha?.node||alpha?.scarcity||'NO_DATA',alpha?'watch':'NO_DATA',alpha?'structural':'observed'),node('fund','FUNDAMENTALS','revenue / margins / FCF','NO_DATA','NO_DATA'),node('pos','POSITIONING','options / TRF / filings',events.length?`${events.length} EVENTS`:'NO_DATA',events.length?'watch':'NO_DATA')];
 const l2=[node('valuation','VALUATION','expected vs market cap',alpha?.upside||'NO_DATA',alpha?'watch':'NO_DATA'),node('price','PRICE STATE','entry / stop / target',setup?`${fmt(setup.e)} / ${fmt(setup.s)} / ${fmt(setup.t)}`:'NO_DATA',setup?.act||'NO_DATA'),node('kill','KILL THESIS','fundamental + price invalidation',setup?.warn||'NOT DEFINED',setup?.warn?'destructive':'NO_DATA')];
 const g=layered([l0,l1,l2]);connectAll(g,l0,l1,'watch','inferred');connectAll(g,l1,l2,'watch','inferred');
 return {title:'COMPANY INTEL',sub:'One entity, one thesis ID, one evidence ledger and one current state across every workspace.',canvas:`${t} INVESTMENT MAP`,badges:['observed','structural','inferred'],graph:g,
 rail:basicRail(t,cand.why||'Candidate selected from current queue.',setup?`${setup.act} · entry ${fmt(setup.e)} · stop ${fmt(setup.s)}`:'No current executable setup.',events.length?`${events.length} institutional events require interpretation.`:'Wait for independent institutional evidence.',`No fundamentals loaded means the thesis cannot be considered complete.`,setup?.warn||`Price invalidation ${fmt(setup?.s)}`,'Company-specific',Math.min(90,cand.score||0),'OPEN EVIDENCE TRACE'),
 ledger:[...(events.slice(0,10).map(e=>({time:e.timestamp,ticker:t,desc:eventDescription(e),state:eventState(e)}))),...(setup?[{time:obj(D.meta).generated,ticker:t,desc:`${setup.act} · ${setup.why}`,state:setup.act}]:[])],queue:[cand]};
}

function modelKnowledge(){
 const c=selectedChain(); if(!c)return emptyModel('KNOWLEDGE GRAPH','No structural knowledge graph reference loaded.');
 const seq=arr(c.propagation_sequence).slice(0,6); const layers=[[node('event','EVENT / STRUCTURAL TRIGGER',short(c.trigger_event,52),c.trigger_status||'REFERENCE','watch','structural',{raw:c})]];
 seq.forEach((s,i)=>layers.push([node('k_'+i,short(s.role,34),arr(s.tickers).slice(0,4).join(' · '),`LAG ${s.horizon_quarters}Q`,'watch','structural',{raw:s})]));
 const g=layered(layers);for(let i=0;i<layers.length-1;i++)g.edges.push(edge(layers[i][0].id,layers[i+1][0].id,'watch','structural',i===0?'economic / physical':'value capture'));
 return {title:'KNOWLEDGE GRAPH',sub:'Edges distinguish observed flow from structural transmission. Structural truth does not imply current mispricing.',canvas:'CAUSAL KNOWLEDGE GRAPH',badges:['structural'],graph:g,
 rail:basicRail(c.name,short(c.mechanism,210),`Chain reference status: ${fmt(c.trigger_status)}.`,`Test each edge for current activation, lag and actual value capture.`,`Narrative/reflexive edges must not be treated like contractual or physical transmission.`,`Invalidate an edge when the mechanism or beneficiary link fails.`,c.horizon||'Variable',40,'TRACE EDGE → SOURCE → INVALIDATION'),ledger:seq.map(s=>({time:`+${s.horizon_quarters}Q`,ticker:arr(s.tickers).slice(0,4).join(', '),desc:s.rationale,state:'STRUCTURAL'})),queue:seq.flatMap(s=>arr(s.tickers).slice(0,1).map(t=>({ticker:t,score:100-s.tier*12,why:s.role,stage:`TIER ${s.tier}`})))};
}

function modelValidation(){
 const grades=obj(D.grades); const entries=Object.entries(grades).filter(([k,v])=>v&&typeof v==='object');
 if(!entries.length)return emptyModel('VALIDATION CENTER','No machine-readable metric grades were loaded.');
 const center=node('prod','PRODUCTION GATE','OOS / DSR / multiple testing','ENFORCED','watch','observed'); const nodes=entries.slice(0,18).map(([k,v],i)=>{const status=v.grade||v.status||v.verdict||'UNKNOWN';const angle=(i/Math.max(1,entries.length))*Math.PI*2;return node('v_'+i,k.replaceAll('_',' ').toUpperCase(),short(v.note||v.reason||'',35),status,status,'observed',{x:500+Math.cos(angle)*(175+(i%2)*60),y:310+Math.sin(angle)*(175+(i%2)*60),raw:v});});center.x=500;center.y=310;const g={nodes:[center,...nodes],edges:nodes.map(n=>edge(n.id,'prod',n.state,'inferred'))};
 return {title:'VALIDATION CENTER',sub:'A component enters production only after its frozen specification beats the baseline out of sample.',canvas:'EVIDENCE LABORATORY',badges:['observed','inferred'],graph:g,
 rail:basicRail('PRODUCTION GATE',`${entries.length} graded components loaded.`,`Validated components may inform decisions within their tested scope.`,`Monitor degradation, drift, calibration and prospective lockbox outcomes.`,`Good in-sample results are not production evidence.`,`Reject or downgrade on OOS failure, drift or broken data lineage.`,'Continuous monitoring',65,'OPEN GRADE CARD'),ledger:entries.slice(0,20).map(([k,v])=>({time:obj(D.meta).generated,ticker:k,desc:v.note||v.reason||JSON.stringify(v),state:v.grade||v.status||'UNKNOWN'})),queue:entries.slice(0,8).map(([k,v])=>({ticker:k,score:/VALID/i.test(v.grade||v.status||'')?90:/PARTIAL/i.test(v.grade||v.status||'')?55:15,why:v.note||v.reason||'',stage:v.grade||v.status||'UNKNOWN'}))};
}

function emptyModel(title,message){const g=layered([[node('empty',title,message,'NO_DATA','NO_DATA')]]);return {title,sub:message,canvas:title,badges:['observed'],graph:g,rail:basicRail('NO DATA',message,'No action.','Connect or repair the required source.','Do not substitute a static narrative or synthetic series.','Data availability is the current invalidation.','Until source recovers',0,'NO ACTION'),ledger:[],queue:[]};}
function getModel(){switch(state.view){case'mc':return modelMission();case'macro':return modelMacro();case'ew':return modelEarly();case'alpha':return modelAlpha();case'inst':return modelInstitutional();case'us':return modelMarket('us','US STOCKS');case'ihsg':return modelMarket('idx','IHSG');case'crypto':return modelMarket('crypto','CRYPTO');case'commod':return modelMarket('commodity','COMMODITIES');case'fx':return modelMarket('fx','FX');case'flow':return modelFlow();case'sc':return modelSupply();case'co':return modelCompany();case'kg':return modelKnowledge();case'rc':return modelValidation();default:return modelMission();}}

function graphSvg(model){
 const g=model.graph||{nodes:[],edges:[]}; const visibleNodes=g.nodes.filter(n=>state.mode==='all'||n.evidence!=='structural'||['sc','kg'].includes(state.view)); const ids=new Set(visibleNodes.map(n=>n.id)); const edges=arr(g.edges).filter(e=>ids.has(e.from)&&ids.has(e.to)); const map=Object.fromEntries(visibleNodes.map(n=>[n.id,n]));
 if(!visibleNodes.length)return `<div class="empty"><div><div class="code">NO OBSERVED NODES</div><p>Switch to <b>ALL LAYERS</b> to inspect structural maps, or connect the required live feed.</p></div></div>`;
 const defs=`<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#365274"/></marker><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
 const edgeHtml=edges.map((e,i)=>{const a=map[e.from],b=map[e.to];if(!a||!b)return'';const dy=b.y-a.y;const c1y=a.y+dy*.42,c2y=a.y+dy*.58;const path=`M ${a.x} ${a.y+26} C ${a.x} ${c1y}, ${b.x} ${c2y}, ${b.x} ${b.y-26}`;const klass=`edge ${e.state||''} ${e.evidence||''} ${e.evidence==='observed'||e.state==='constructive'||e.state==='destructive'?'active':''}`;const lx=(a.x+b.x)/2,ly=(a.y+b.y)/2;return `<path class="${klass}" d="${path}" stroke-width="${e.width||1.7}" marker-end="url(#arrow)"/>${e.label?`<text class="edge-label" x="${lx}" y="${ly-4}" text-anchor="middle">${esc(e.label)}</text>`:''}`;}).join('');
 const nodeHtml=visibleNodes.map(n=>{const w=168,h=54,x=n.x-w/2,y=n.y-h/2;const selected=state.selected===n.id?'selected':'';const ev=n.evidence||'observed';return `<g class="node ${n.state||''} ${ev} ${selected}" data-node="${esc(n.id)}" transform="translate(${x},${y})"><rect class="node-box" width="${w}" height="${h}" rx="4"/><text class="node-title" x="10" y="17">${esc(short(n.label,24))}</text><text class="node-sub" x="10" y="33">${esc(short(n.sub,30))}</text><text class="node-value" x="158" y="17" text-anchor="end">${esc(short(n.value,18))}</text><rect class="node-badge" x="116" y="39" width="42" height="10" rx="5"/><text class="node-badge-text" x="137" y="47" text-anchor="middle">${esc(ev.toUpperCase().slice(0,6))}</text></g>`;}).join('');
 return `<svg viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet">${defs}${edgeHtml}${nodeHtml}</svg>`;
}

function renderRail(r){
 const conf=Math.max(0,Math.min(100,num(r.confidence)||0));return `<div class="location"><div class="eyebrow">YOU ARE HERE</div><div class="main">${esc(r.title||'NO DATA')}</div><div class="desc">${esc(r.desc||'')}</div></div>${[['CURRENT',r.current,''],['NEXT',r.next,'green'],['ALTERNATIVE',r.alternative,'amber'],['INVALIDATION',r.invalidation,'mag'],['TIME WINDOW',r.window,''],['ACTION',r.action,'green']].map(([k,v,c])=>`<div class="decision-row"><div class="decision-label">${k}</div><div class="decision-value ${c}">${esc(v||'—')}</div>${k==='ACTION'?`<div class="confidence"><i style="width:${conf}%"></i></div><div class="decision-label" style="margin-top:4px">CONFIDENCE ${conf}%</div>`:''}</div>`).join('')}`;
}
function renderLedger(rows){
 const filtered=arr(rows).filter(r=>!state.search||JSON.stringify(r).toLowerCase().includes(state.search.toLowerCase())); if(!filtered.length)return `<div class="empty"><div><div class="code">NO EVIDENCE ROWS</div><p>The system will not fill this panel with mock values.</p></div></div>`;
 return `<div class="ledger">${filtered.slice(0,40).map(r=>`<div class="ledger-row"><div class="ledger-time">${esc(timeLabel(r.time))}</div><div class="ledger-ticker">${esc(short(r.ticker,18))}</div><div class="ledger-desc" title="${esc(r.desc)}">${esc(r.desc)}</div><div class="state-tag ${normalizeState(r.state)}">${esc(short(r.state,12))}</div></div>`).join('')}</div>`;
}
function renderQueue(rows){
 const filtered=arr(rows).filter(r=>!state.search||JSON.stringify(r).toLowerCase().includes(state.search.toLowerCase())); if(!filtered.length)return `<div class="empty"><div><div class="code">NO ACTION QUEUE</div><p>No candidate has enough evidence to occupy the queue.</p></div></div>`;
 return `<div class="queue">${filtered.slice(0,10).map((r,i)=>`<div class="queue-item" data-queue="${esc(r.ticker)}"><div class="queue-rank">${String(i+1).padStart(2,'0')}</div><div class="queue-main"><b>${esc(r.ticker)}</b><div>${esc(short(r.stage||r.why,42))}</div></div><div class="queue-score">${Math.round(num(r.score)||0)}</div></div>`).join('')}</div>`;
}
function renderTape(){
 const events=arr(obj(D.institutional).events); const base=events.length?events.slice(0,35):arr(obj(D.data_health).sources).map(x=>({timestamp:obj(D.meta).generated,event_type:x.dataset,ticker:x.provider,description:x.note,state:x.state}));
 const html=base.map(e=>`<span class="tape-item"><span>${esc(timeLabel(e.timestamp).slice(11,19))}</span> <span class="type">${esc(e.event_type||e.dataset||'FEED')}</span> <b>${esc(e.ticker||e.provider||'—')}</b> <span>${esc(short(e.description||eventDescription(e),68))}</span>${e.premium?` <span class="money">${money(e.premium)}</span>`:''}</span>`).join('');document.getElementById('tape').innerHTML=(html||'<span class="tape-item">NO LIVE EVENTS — DATA GATE ACTIVE</span>')+(html||'');
}
function badgeHtml(b){return `<span class="evidence-pill ${b}">${b.toUpperCase()}</span>`;}
function openDetail(raw,title){document.getElementById('drawerTitle').textContent=title||'DETAIL';const entries=Object.entries(obj(raw)).filter(([k,v])=>typeof v!=='object'||v===null).slice(0,16);document.getElementById('drawerBody').innerHTML=`<div class="detail-grid">${entries.map(([k,v])=>`<div class="detail-cell"><div class="k">${esc(k)}</div><div class="v">${esc(fmt(v))}</div></div>`).join('')}</div><div class="raw">${esc(JSON.stringify(raw,null,2))}</div>`;document.getElementById('drawerBackdrop').classList.add('open');}

function render(){
 renderSidebar();renderTop();const model=getModel();window.__MODEL=model;document.getElementById('viewTitle').textContent=model.title;document.getElementById('viewSub').textContent=model.sub;document.getElementById('canvasTitle').textContent=model.canvas;document.getElementById('canvasMeta').textContent=`${arr(model.graph?.nodes).length} nodes · ${arr(model.graph?.edges).length} edges`;document.getElementById('canvasBadges').innerHTML=arr(model.badges).map(badgeHtml).join('');document.getElementById('graph').innerHTML=graphSvg(model);document.getElementById('rail').innerHTML=renderRail(model.rail);document.getElementById('ledger').innerHTML=renderLedger(model.ledger);document.getElementById('queue').innerHTML=renderQueue(model.queue);document.getElementById('ledgerMeta').textContent=`${arr(model.ledger).length} records`;document.getElementById('queueMeta').textContent=`${arr(model.queue).length} ranked`;renderTape();
 document.querySelectorAll('.seg').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));
 document.querySelectorAll('.node').forEach(el=>el.onclick=()=>{const id=el.dataset.node;state.selected=id;const n=arr(model.graph.nodes).find(x=>x.id===id);render();if(n?.raw)openDetail(n.raw,n.label);});
 document.querySelectorAll('.queue-item').forEach(el=>el.onclick=()=>openDetail(arr(model.queue).find(x=>x.ticker===el.dataset.queue)||{},el.dataset.queue));
}

document.querySelectorAll('.seg').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;persistState();render();});
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;const model=getModel();document.getElementById('ledger').innerHTML=renderLedger(model.ledger);document.getElementById('queue').innerHTML=renderQueue(model.queue);});
document.getElementById('drawerClose').onclick=()=>document.getElementById('drawerBackdrop').classList.remove('open');document.getElementById('drawerBackdrop').onclick=e=>{if(e.target.id==='drawerBackdrop')e.currentTarget.classList.remove('open');};
render();
})();
</script>
</body>
</html>
