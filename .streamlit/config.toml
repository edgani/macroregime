[server]
headless = true
address = "127.0.0.1"
port = 8501
fileWatcherType = "none"
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#F2B134"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#171C24"
textColor = "#F4F6F8"
font = "sans serif"
